<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Stranger Things - Upside Down Survival</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #140a28;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #canvas { display: block; width: 100%; height: 100%; }
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #score {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left));
    font-family: 'Creepster', cursive; font-size: clamp(20px, 4.5vmin, 32px);
    color: #ff5555;
    text-shadow: 0 0 8px #ff0000, 0 0 20px #ff000088;
  }
  #wave-info {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: clamp(18px, 4.2vmin, 30px); color: #d877ff;
    text-shadow: 0 0 10px #aa00ff;
    text-align: center;
  }
  #lives {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); right: calc(14px + env(safe-area-inset-right));
    font-family: 'Creepster', cursive; font-size: clamp(18px, 4.2vmin, 30px); color: #ff6688;
    text-shadow: 0 0 8px #ff0055;
  }
  #special-bar-container {
    position: absolute; bottom: calc(18px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: min(200px, 44vw); height: 16px;
    border: 2px solid #aa00cc;
    border-radius: 9px; overflow: hidden;
    box-shadow: 0 0 10px #8800cc88;
  }
  #special-bar {
    height: 100%; width: 100%;
    background: linear-gradient(to right, #4400aa, #aa00ff);
    transition: width 0.1s;
  }
  #special-label {
    position: absolute; bottom: calc(38px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: clamp(13px, 3vmin, 18px); color: #cc77ff;
    text-align: center; white-space: nowrap;
  }
  #wave-announce {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; opacity: 0;
    transition: opacity 0.4s;
  }
  #wave-announce .title {
    font-family: 'Creepster', cursive; font-size: 64px; color: #cc00ff;
    text-shadow: 0 0 20px #ff00ff, 0 0 40px #aa00ff;
  }
  #wave-announce .subtitle {
    font-family: 'VT323', monospace; font-size: 32px; color: #ff88ff;
    text-shadow: 0 0 10px #ff44ff;
    margin-top: 8px;
  }
  #combo-display {
    position: absolute; top: 55%; left: 50%; transform: translateX(-50%);
    font-family: 'Creepster', cursive; font-size: 48px; color: #ffcc00;
    text-shadow: 0 0 16px #ffaa00, 0 0 32px #ff8800;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #start-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15,7,32,0.94); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    padding: 24px;
  }
  #lights-row {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-around; padding: 10px;
    pointer-events: none;
  }
  .bulb {
    width: 16px; height: 22px; border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
    animation: blink 1s infinite alternate;
  }
  @keyframes blink { 0%{opacity:1} 100%{opacity:0.2} }
  #start-title {
    font-family: 'Creepster', cursive; font-size: clamp(40px, 11vmin, 80px); color: #ff3333;
    text-shadow: 0 0 20px #ff0000, 0 0 50px #cc0000;
    letter-spacing: 4px; text-align: center;
    animation: titlePulse 2s infinite alternate;
    margin-bottom: 10px;
  }
  @keyframes titlePulse {
    0% { text-shadow: 0 0 20px #ff0000, 0 0 50px #cc0000; }
    100% { text-shadow: 0 0 30px #ff4444, 0 0 80px #ff0000, 0 0 120px #880000; }
  }
  #start-subtitle {
    font-family: 'VT323', monospace; font-size: clamp(20px, 5vmin, 32px); color: #d877ff;
    text-shadow: 0 0 12px #aa00ff; margin-bottom: 48px; text-align: center;
  }
  #start-btn, #restart-btn {
    font-family: 'Creepster', cursive; font-size: clamp(22px, 5vmin, 30px);
    background: rgba(60,0,90,0.5); border: 3px solid #cc00ff;
    color: #ff99ff; min-height: 64px; min-width: 240px; padding: 14px 48px; cursor: pointer;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 3px;
    box-shadow: 0 0 24px #aa00ffaa; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #start-btn:hover, #restart-btn:hover, #start-btn:active, #restart-btn:active {
    background: #6a00aa; box-shadow: 0 0 44px #cc00ff;
    color: #ffffff; transform: scale(1.04);
  }
  #death-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15,7,32,0.92); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; padding: 24px;
  }
  #death-title {
    font-family: 'Creepster', cursive; font-size: clamp(56px, 15vmin, 110px); color: #ff0000;
    text-shadow: 0 0 30px #ff0000, 0 0 60px #880000;
    animation: deathPulse 1.5s infinite alternate;
  }
  @keyframes deathPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.04); }
  }
  #death-stats {
    font-family: 'VT323', monospace; font-size: clamp(18px, 4.5vmin, 28px); color: #d099ff;
    text-align: center; margin: 28px 0 44px;
    line-height: 1.8;
  }
  /* Mobile controls */
  #mobile-controls { display: none; }
  @media (pointer: coarse) {
    #mobile-controls { display: block; }
  }
  #joystick-zone {
    position: absolute; bottom: calc(70px + env(safe-area-inset-bottom));
    left: calc(22px + env(safe-area-inset-left)); width: 132px; height: 132px;
    border-radius: 50%; border: 3px solid rgba(170,120,255,0.55);
    background: rgba(120,70,200,0.18); pointer-events: all;
    touch-action: none; z-index: 20;
  }
  #joystick-knob {
    position: absolute; width: 58px; height: 58px;
    border-radius: 50%; background: rgba(200,120,255,0.65);
    border: 3px solid rgba(220,160,255,0.95);
    box-shadow: 0 0 16px rgba(200,120,255,0.7);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  #fire-btn {
    position: absolute; bottom: calc(70px + env(safe-area-inset-bottom));
    right: calc(22px + env(safe-area-inset-right)); width: 104px; height: 104px;
    border-radius: 50%; background: rgba(210,30,40,0.62);
    border: 4px solid #ff5555; color: #fff;
    font-family: 'Creepster', cursive; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all; touch-action: none; cursor: pointer;
    box-shadow: 0 0 22px #ff0000aa;
    user-select: none; z-index: 20; transition: transform 0.08s, background 0.08s;
  }
  #fire-btn:active {
    background: rgba(255,70,80,0.85); transform: scale(0.92);
  }
  #power-btn {
    position: absolute; bottom: calc(190px + env(safe-area-inset-bottom));
    right: calc(38px + env(safe-area-inset-right)); width: 80px; height: 80px;
    border-radius: 50%; background: rgba(120,20,210,0.62);
    border: 4px solid #cc66ff; color: #fff;
    font-family: 'VT323', monospace; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all; touch-action: none; cursor: pointer;
    box-shadow: 0 0 22px #aa00ffaa; flex-direction: column;
    user-select: none; text-align: center; z-index: 20; transition: transform 0.08s, background 0.08s;
  }
  #power-btn:active {
    background: rgba(170,60,255,0.85); transform: scale(0.92);
  }
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(120,240,255,0.9);
    box-shadow: 0 0 6px rgba(100,224,255,0.9);
  }
  #crosshair::before { width: 3px; height: 22px; left: 9.5px; top: 0; }
  #crosshair::after { width: 22px; height: 3px; left: 0; top: 9.5px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score">SCORE: 0</div>
  <div id="wave-info">WAVE 1</div>
  <div id="lives">❤️ 20</div>
  <div id="special-label">PSYCHIC BLAST [SPACE]</div>
  <div id="special-bar-container"><div id="special-bar"></div></div>
  <div id="wave-announce">
    <div class="title" id="wave-title">WAVE 1</div>
    <div class="subtitle" id="wave-subtitle">THEY'RE COMING</div>
  </div>
  <div id="combo-display"></div>
</div>

<div id="start-screen">
  <div id="lights-row"></div>
  <div id="start-title">STRANGER THINGS</div>
  <div id="start-subtitle">UPSIDE DOWN SURVIVAL</div>
  <button id="start-btn">ENTER THE GATE</button>
</div>

<div id="death-screen">
  <div id="death-title">YOU DIED</div>
  <div id="death-stats" id="death-stats"></div>
  <button id="restart-btn">TRY AGAIN</button>
</div>

<div id="mobile-controls">
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="fire-btn">FIRE</div>
  <div id="power-btn">⚡<br>POWER</div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================
// 0. CHARACTER ART ASSETS (drop files in the repo to use real art)
//   - <name>.glb  -> exact 3D model (preferred)
//   - <name>.png  -> photo cutout billboard (transparent PNG recommended)
//   If neither file exists, the built-in stylized model is used.
// ============================================================
const texLoader = new THREE.TextureLoader();
let _gltfLoader = null;
function getGLTFLoader() {
  if (!_gltfLoader) {
    _gltfLoader = import('three/addons/loaders/GLTFLoader.js').then(m => new m.GLTFLoader());
  }
  return _gltfLoader;
}
// Swap a procedural character group's visuals for a real model/photo if present.
function applyCharacterArt(group, { name, height = 2.0, yOffset = 0 }) {
  const hideProc = () => group.traverse(o => { if (o.isMesh) o.visible = false; });
  // 2) Photo cutout billboard (always faces the camera)
  const tryPhoto = () => texLoader.load(
    `${name}.png`,
    tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      hideProc();
      const aspect = (tex.image && tex.image.width / tex.image.height) || 0.6;
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, toneMapped: false }));
      sprite.scale.set(height * aspect, height, 1);
      sprite.position.y = yOffset + height / 2;
      group.add(sprite);
    },
    undefined,
    () => {/* 3) no asset files -> keep the stylized built-in model */}
  );
  // 1) Prefer a real 3D model; fall back to photo, then to built-in
  getGLTFLoader().then(loader => loader.load(
    `${name}.glb`,
    gltf => {
      hideProc();
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3(); box.getSize(size);
      const sc = height / (size.y || 1);
      model.scale.setScalar(sc);
      model.position.y = yOffset - box.min.y * sc;
      model.traverse(o => { if (o.isMesh) o.castShadow = true; });
      group.add(model);
    },
    undefined,
    tryPhoto
  )).catch(tryPhoto);
}

// ============================================================
// 1. CONSTANTS
// ============================================================
const WORLD_SIZE = 40;
const GROUND_SEGS = 40;
const WALL_COUNT = 35;
const SPORE_COUNT = 60;
const FIRE_RATE = 5; // shots per second
const BULLET_SPEED = 22;
const BULLET_RANGE = 44;
const PLAYER_SPEED = 6;
const SPECIAL_COOLDOWN = 8;
const SPECIAL_RADIUS = 12;
const SPECIAL_DAMAGE = 60;
const MAX_PARTICLES = matchMedia('(pointer: coarse)').matches ? 250 : 320;
const ENEMY_SPAWN_MIN = 14;
const ENEMY_SPAWN_MAX = 34;
const BOSS_WAVE_INTERVAL = 5;
const COMBO_WINDOW = 3;

// ============================================================
// 2. AUDIO ENGINE
// ============================================================
let audioCtx = null;
let ambientDrone = null;
let ambientGainNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Ambient drone
  ambientDrone = audioCtx.createOscillator();
  ambientDrone.type = 'sawtooth';
  ambientDrone.frequency.setValueAtTime(55, audioCtx.currentTime);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(200, audioCtx.currentTime);
  const delay = audioCtx.createDelay(2.0);
  delay.delayTime.setValueAtTime(0.6, audioCtx.currentTime);
  const feedback = audioCtx.createGain();
  feedback.gain.setValueAtTime(0.35, audioCtx.currentTime);
  ambientGainNode = audioCtx.createGain();
  ambientGainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
  ambientDrone.connect(filter);
  filter.connect(delay);
  delay.connect(feedback);
  feedback.connect(delay);
  filter.connect(ambientGainNode);
  delay.connect(ambientGainNode);
  ambientGainNode.connect(audioCtx.destination);
  ambientDrone.start();
}

function playShoot() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.setValueAtTime(1200, t);
  f.frequency.exponentialRampToValueAtTime(200, t + 0.1);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t + 0.13);
}

function playHitEnemy() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.16);
}

function playEnemyDeath() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800 - i * 200, t + i * 0.04);
    osc.frequency.exponentialRampToValueAtTime(50, t + 0.3 + i * 0.04);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.18, t + i * 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32 + i * 0.04);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i * 0.04); osc.stop(t + 0.35 + i * 0.04);
  }
}

function playPlayerHurt() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.3);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.36);
}

function playWaveStart() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'square'; osc.frequency.setValueAtTime(110, t);
  osc.frequency.exponentialRampToValueAtTime(880, t + 0.8);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t); g.gain.linearRampToValueAtTime(0.3, t + 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 1.1);
}

function playPowerUp() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, t + i * 0.08);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.2, t + i * 0.08); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + i * 0.08);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i * 0.08); osc.stop(t + 0.32 + i * 0.08);
  });
}

function playSpecialAbility() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.setValueAtTime(40, t);
  osc.frequency.exponentialRampToValueAtTime(20, t + 0.5);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1800, t);
  osc2.frequency.exponentialRampToValueAtTime(3600, t + 0.3);
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(g); g.connect(audioCtx.destination);
  osc2.connect(g2); g2.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.65);
  osc2.start(t); osc2.stop(t + 0.45);
}

// ============================================================
// 3. SCENE SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
const isMobile = matchMedia('(pointer: coarse)').matches;
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.7;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x140a28);
scene.fog = new THREE.FogExp2(0x241640, 0.007);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 20, -11);
camera.lookAt(0, 0, 0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.7, 0.5, 0.7
);
composer.addPass(bloomPass);

// Lights - bright, stylized, high-contrast (NOT realistic-dark)
const ambientLight = new THREE.AmbientLight(0x9a86c0, 1.4);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x9a7aff, 0x3a2a44, 1.0);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffd0c0, 1.6);
dirLight.position.set(8, 24, -6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);
// Cyan rim/back light - makes creatures pop against the fog
const rimLight = new THREE.DirectionalLight(0x66e0ff, 1.3);
rimLight.position.set(-6, 9, 14);
scene.add(rimLight);

// Player lantern (follows player) - big radius so the near area is well lit
const lantern = new THREE.PointLight(0xffe0b0, 3.0, 30, 1.6);
lantern.castShadow = true;
lantern.shadow.mapSize.width = 512;
lantern.shadow.mapSize.height = 512;
scene.add(lantern);

// Cap simultaneous dynamic point lights (lantern + per-enemy glows)
const MAX_ENEMY_LIGHTS = 11;
let activeEnemyLights = 0;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// 4. ENVIRONMENT
// ============================================================
function buildEnvironment() {
  // Flat ground plane - identical everywhere
  const gGeo = new THREE.PlaneGeometry(WORLD_SIZE * 2, WORLD_SIZE * 2, 1, 1);
  // Uniform greyish ground - same color everywhere, unaffected by lighting
  const gMat = new THREE.MeshBasicMaterial({ color: 0x5a5a60 });
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Large faint radial glow under the play area
  const glowTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, 'rgba(140,90,220,0.55)');
    g.addColorStop(0.5, 'rgba(90,50,160,0.18)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  })();
  const glowDisc = new THREE.Mesh(
    new THREE.PlaneGeometry(WORLD_SIZE * 1.6, WORLD_SIZE * 1.6),
    new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  glowDisc.rotation.x = -Math.PI / 2;
  glowDisc.position.y = 0.06;
  scene.add(glowDisc);

  // Boundary glow lines
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xff3355, linewidth: 3, toneMapped: false });
  const half = WORLD_SIZE;
  [[[-half,-half],[half,-half]],[[half,-half],[half,half]],[[half,half],[-half,half]],[[-half,half],[-half,-half]]].forEach(([a,b]) => {
    const pts = [new THREE.Vector3(a[0], 0.1, a[1]), new THREE.Vector3(b[0], 0.1, b[1])];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, edgeMat);
    scene.add(line);
    // Glow mesh
    const gGeoB = new THREE.BoxGeometry(Math.abs(b[0]-a[0]) + 0.1, 0.42, 0.42);
    const gMatB = new THREE.MeshBasicMaterial({ color: 0xff3355, transparent: true, opacity: 0.9, toneMapped: false });
    const gMesh = new THREE.Mesh(gGeoB, gMatB);
    gMesh.position.set((a[0]+b[0])/2, 0.2, (a[1]+b[1])/2);
    if (Math.abs(a[1]-b[1]) > 0.1) {
      gGeoB.scale(0.42 / (Math.abs(b[0]-a[0])+0.1), 1, (Math.abs(b[1]-a[1])+0.1) / 0.42);
    }
    gMesh.userData.boundaryGlow = true;
    boundaryGlows.push(gMesh);
    scene.add(gMesh);
  });

  // Walls
  for (let i = 0; i < WALL_COUNT; i++) {
    const w = 1 + Math.random() * 2.5;
    const d = 1 + Math.random() * 2;
    const h = 1.5 + Math.random() * 3;
    const wGeo = new THREE.BoxGeometry(w, h, d);
    const wMat = new THREE.MeshStandardMaterial({ color: 0x4a3a66, emissive: 0x241636, emissiveIntensity: 0.9, roughness: 0.9, metalness: 0 });
    const wall = new THREE.Mesh(wGeo, wMat);
    wall.position.set(
      (Math.random() - 0.5) * (WORLD_SIZE * 1.6),
      h / 2,
      (Math.random() - 0.5) * (WORLD_SIZE * 1.6)
    );
    wall.rotation.y = Math.random() * Math.PI;
    wall.castShadow = true;
    wall.receiveShadow = true;
    wall.userData.isWall = true;
    scene.add(wall);
    walls.push(wall);
  }

  // Spores - bigger, brighter, double as ambient light cues
  for (let i = 0; i < SPORE_COUNT; i++) {
    const sGeo = new THREE.SphereGeometry(0.16 + Math.random() * 0.22, 6, 6);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xcc99ff, transparent: true, opacity: 0.9, toneMapped: false });
    const spore = new THREE.Mesh(sGeo, sMat);
    spore.position.set(
      (Math.random() - 0.5) * WORLD_SIZE * 1.8,
      0.8 + Math.random() * 4,
      (Math.random() - 0.5) * WORLD_SIZE * 1.8
    );
    spore.userData.baseY = spore.position.y;
    spore.userData.phase = Math.random() * Math.PI * 2;
    spore.userData.freq = 0.3 + Math.random() * 0.5;
    spore.userData.driftX = (Math.random() - 0.5) * 0.008;
    spore.userData.driftZ = (Math.random() - 0.5) * 0.008;
    scene.add(spore);
    spores.push(spore);
  }

  // Distant atmospheric embers drifting up (additive, sparse)
  for (let i = 0; i < 50; i++) {
    const eGeo = new THREE.SphereGeometry(0.04 + Math.random() * 0.05, 4, 4);
    const eMat = new THREE.MeshBasicMaterial({ color: 0xff7a55, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false });
    const ember = new THREE.Mesh(eGeo, eMat);
    ember.position.set(
      (Math.random() - 0.5) * WORLD_SIZE * 2,
      Math.random() * 8,
      (Math.random() - 0.5) * WORLD_SIZE * 2
    );
    ember.userData.rise = 0.3 + Math.random() * 0.5;
    ember.userData.sway = Math.random() * Math.PI * 2;
    scene.add(ember);
    embers.push(ember);
  }

  // Floating "snow" - the drifting white spores/ash of the Upside Down
  const flakeTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 32;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.4, 'rgba(230,235,255,0.7)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(c);
  })();
  const flakeMat = new THREE.SpriteMaterial({ map: flakeTex, transparent: true, opacity: 0.85, depthWrite: false, toneMapped: false });
  for (let i = 0; i < 360; i++) {
    const flake = new THREE.Sprite(flakeMat);
    const sz = 0.06 + Math.random() * 0.13;
    flake.scale.set(sz, sz, 1);
    flake.position.set(
      (Math.random() - 0.5) * WORLD_SIZE * 2.1,
      Math.random() * 13,
      (Math.random() - 0.5) * WORLD_SIZE * 2.1
    );
    flake.userData.fall = 0.35 + Math.random() * 0.55;
    flake.userData.sway = Math.random() * Math.PI * 2;
    flake.userData.swaySpeed = 0.4 + Math.random() * 0.8;
    flake.userData.swayAmp = 0.15 + Math.random() * 0.35;
    scene.add(flake);
    snow.push(flake);
  }
}

// ============================================================
// 5. PLAYER (ELEVEN)
// ============================================================
function buildElevenModel() {
  const group = new THREE.Group();

  // Eleven's iconic colorful patterned shirt (procedural texture)
  const shirtTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0b0b14'; ctx.fillRect(0, 0, 128, 128);
    const palette = ['#e23b3b', '#2f7ad8', '#f2c43b', '#3bbf63', '#8e44c8', '#e85aa0', '#28c0c0', '#f5f5f5'];
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = palette[(Math.random() * palette.length) | 0];
      const w = 12 + Math.random() * 26, h = 12 + Math.random() * 26;
      ctx.save();
      ctx.translate(Math.random() * 128, Math.random() * 128);
      ctx.rotate(Math.random() * Math.PI);
      ctx.fillRect(-w / 2, -h / 2, w, h);
      ctx.restore();
    }
    for (let i = 0; i < 4; i++) {
      const cx = Math.random() * 128, cy = Math.random() * 128;
      ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let a = 0; a < 7; a += 0.2) {
        const r = a * 1.8;
        const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  })();
  const shirtMat = new THREE.MeshStandardMaterial({
    map: shirtTex, emissiveMap: shirtTex, emissive: 0xffffff,
    emissiveIntensity: 0.45, roughness: 0.75
  });

  // Body - patterned shirt
  const bodyGeo = new THREE.CylinderGeometry(0.23, 0.3, 0.72, 12);
  const body = new THREE.Mesh(bodyGeo, shirtMat);
  body.position.y = 0.6;

  // Neck

  [-1, 1].forEach(s => {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.075, 0.016, 0.02), browMat);
    brow.position.set(s * 0.082, 1.245, 0.196);

  // Eyes - sclera + brown iris + pupil + highlight
  [-1, 1].forEach(s => {

    sclera.scale.set(1.0, 0.78, 0.7);
    group.add(sclera);
    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8),

    iris.position.set(s * 0.082, 1.205, 0.214);
    group.add(iris);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.011, 6, 6), new THREE.MeshBasicMaterial({ color: 0x080808 }));
    pupil.position.set(s * 0.082, 1.205, 0.226);
    group.add(pupil);
    const glint = new THREE.Mesh(new THREE.SphereGeometry(0.006, 5, 5), new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false }));
    glint.position.set(s * 0.082 + 0.008, 1.214, 0.23);
    group.add(glint);
    // Upper eyelash line
    const lash = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.01, 0.018), new THREE.MeshBasicMaterial({ color: 0x241608 }));
    lash.position.set(s * 0.082, 1.222, 0.205);
    lash.rotation.z = s * -0.1;
    group.add(lash);
    // Soft cheek blush
    const blush = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xe88a86, emissive: 0x6a2a28, emissiveIntensity: 0.35, roughness: 0.7, transparent: true, opacity: 0.55 }));
    blush.position.set(s * 0.115, 1.155, 0.18);
    blush.scale.set(1.1, 0.7, 0.4);
    group.add(blush);

  // Nose - bridge + tip
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.028, 0.075, 6),
    new THREE.MeshStandardMaterial({ color: 0xe0aa86, emissive: 0x6a4a32, emissiveIntensity: 0.5, roughness: 0.55 }));
  nose.position.set(0, 1.155, 0.215);
  nose.rotation.x = Math.PI * 0.5;
  group.add(nose);

  // Wavy center-parted brown bob (Season 3 look)
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x4a3018, emissive: 0x241608, emissiveIntensity: 0.5, roughness: 0.95 });
  const hairHi = new THREE.MeshStandardMaterial({ color: 0x6b4a26, emissive: 0x3a2410, emissiveIntensity: 0.5, roughness: 0.95 });
  // Back mass reaching to the shoulders
  const hairBack = new THREE.Mesh(new THREE.SphereGeometry(0.255, 16, 14), hairMat);
  hairBack.position.set(0, 1.2, -0.06);
  hairBack.scale.set(1.12, 1.18, 1.1);
  group.add(hairBack);
  // Crown with a visible center part (two swept halves)
  [-1, 1].forEach(s => {
    const crown = new THREE.Mesh(new THREE.SphereGeometry(0.2, 14, 12), s < 0 ? hairMat : hairHi);
    crown.position.set(s * 0.06, 1.305, -0.01);
    crown.scale.set(0.92, 0.7, 1.02);
    group.add(crown);
  });
  // Side-swept fringe framing the forehead
  [-1, 1].forEach(s => {
    const bang = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.16, 5, 8), s < 0 ? hairHi : hairMat);
    bang.position.set(s * 0.13, 1.27, 0.16);
    bang.rotation.set(0.5, 0, s * 0.55);
    group.add(bang);

  // Wavy locks down to the shoulders
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    if (Math.sin(a) > 0.5 && Math.abs(Math.cos(a)) < 0.45) continue; // keep face clear
    const len = 0.26 + Math.random() * 0.12;
    const lock = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, len, 5, 7), i % 3 === 0 ? hairHi : hairMat);
    const rad = 0.215;
    lock.position.set(Math.cos(a) * rad, 0.99, Math.sin(a) * rad * 0.8 - 0.05);
    lock.rotation.x = Math.sin(a) * 0.4 + 0.1;
    lock.rotation.z = Math.cos(a) * 0.4;
    group.add(lock);
  }

  // Smiling mouth - fuller lips + bright teeth
  const smileMat = new THREE.MeshStandardMaterial({ color: 0xcf5f6e, emissive: 0x7a2f3a, emissiveIntensity: 0.55, roughness: 0.5 });
  const smile = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.019, 8, 18, Math.PI), smileMat);
  smile.position.set(0, 1.107, 0.205);
  smile.rotation.z = Math.PI;
  group.add(smile);
  const teeth = new THREE.Mesh(new THREE.TorusGeometry(0.052, 0.009, 6, 14, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0xfbf5ec, emissive: 0x665544, emissiveIntensity: 0.3, roughness: 0.4 }));
  teeth.position.set(0, 1.118, 0.207);
  teeth.rotation.z = Math.PI;
  group.add(teeth);

  // Skin + sleeve materials
  const skinMat = new THREE.MeshStandardMaterial({ color: skinTone, emissive: 0x6a4a32, emissiveIntensity: 0.5, roughness: 0.55 });
  const sleeveMat = new THREE.MeshStandardMaterial({ map: shirtTex, emissiveMap: shirtTex, emissive: 0xffffff, emissiveIntensity: 0.45, roughness: 0.75 });

  // Arms - sleeve upper, bare forearm, hand with 5 fingers
  [-1, 1].forEach((side, armIdx) => {
    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.052, 0.26, 5, 8), sleeveMat);
    upper.position.set(side * 0.285, 0.84, 0.02);
    upper.rotation.z = side * 0.28;
    upper.userData.isArm = true;
    upper.userData.side = side;
    group.add(upper);

    const fore = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.24, 5, 8), skinMat);
    fore.position.set(side * 0.36, 0.6, 0.06);
    fore.rotation.z = side * 0.22;
    group.add(fore);

    const handGrp = new THREE.Group();
    handGrp.position.set(side * 0.4, 0.46, 0.09);
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.085, 0.035), skinMat);
    handGrp.add(palm);
    for (let f = 0; f < 4; f++) {
      const fin = new THREE.Mesh(new THREE.CapsuleGeometry(0.011, 0.05, 3, 5), skinMat);
      fin.position.set((f - 1.5) * 0.02, -0.07, 0);
      handGrp.add(fin);
    }
    const thumb = new THREE.Mesh(new THREE.CapsuleGeometry(0.012, 0.04, 3, 5), skinMat);
    thumb.position.set(side * 0.04, -0.02, 0.01);
    thumb.rotation.z = side * 0.9;
    handGrp.add(thumb);
    group.add(handGrp);

    // Invisible glow marker reused by the shooting effect
    const glow = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));
    glow.position.set(side * 0.42, 0.42, 0.12);
    glow.userData.isHandGlow = true;
    group.add(glow);
    if (armIdx === 0) player.leftHand = glow;
    else player.rightHand = glow;
  });

  // Legs - hip pivot (jeans thigh + shin) + sneaker, swings while walking
  const jeansMat = new THREE.MeshStandardMaterial({ color: 0x2a3550, emissive: 0x141c2e, emissiveIntensity: 0.55, roughness: 0.8 });
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0xe8e4dc, emissive: 0x4a4640, emissiveIntensity: 0.35, roughness: 0.6 });
  [-1, 1].forEach((side, legIdx) => {
    const hip = new THREE.Group();
    hip.position.set(side * 0.1, 0.34, 0);
    hip.userData.isLeg = true;
    hip.userData.side = side;
    hip.userData.legIdx = legIdx;
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.18, 5, 8), jeansMat);
    thigh.position.y = -0.12;
    hip.add(thigh);
    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.05, 0.18, 5, 8), jeansMat);
    shin.position.y = -0.3;
    hip.add(shin);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.085, 0.06, 0.16), shoeMat);
    shoe.position.set(0, -0.42, 0.04);
    hip.add(shoe);
    group.add(hip);
  });

  // Nosebleed (hidden by default)
  for (let i = 0; i < 2; i++) {
    const nbGeo = new THREE.CylinderGeometry(0.01, 0.015, 0.08, 4);
    const nbMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const nb = new THREE.Mesh(nbGeo, nbMat);
    nb.position.set(i === 0 ? -0.02 : 0.02, 1.1, 0.21);
    nb.visible = false;
    nb.userData.isNosebleed = true;
    group.add(nb);
    player.nosebleed.push(nb);
  }

  group.castShadow = true;
  // Use real art (eleven.glb / eleven.png) if present, else this stylized model
  applyCharacterArt(group, { name: 'eleven', height: 1.7, yOffset: 0 });
  scene.add(group);
  player.mesh = group;
  player.mesh.position.set(0, 0, 0);
}

// 6. ENEMIES
// ============================================================
function buildDemogorgon(isBoss = false) {
  const group = new THREE.Group();
  const scale = isBoss ? 1.95 : 1.18;
  const skinMat = new THREE.MeshStandardMaterial({ color: 0x6e645a, emissive: 0x261d16, emissiveIntensity: 0.45, roughness: 0.97, metalness: 0 });
  // Shared bioluminescent vein/ridge material - traces the silhouette in red neon
  const veinMat = new THREE.MeshBasicMaterial({ color: 0xff3355, toneMapped: false });
  group.userData.skinMats = [];
  const trackSkin = m => { group.userData.skinMats.push(m); return m; };

  // Body - more hunched
  const bodyGeo = new THREE.CapsuleGeometry(0.15 * scale, 0.92 * scale, 6, 10);
  const bodyMesh = new THREE.Mesh(bodyGeo, trackSkin(skinMat.clone()));
  bodyMesh.position.y = 0.95 * scale;
  bodyMesh.position.z = 0.1 * scale;
  bodyMesh.scale.set(1.0, 1.0, 0.82);
  bodyMesh.rotation.x = 0.42;
  group.add(bodyMesh);

  // Cranial stalk - small smooth skull behind the flower (no face)
  const headGeo = new THREE.SphereGeometry(0.22 * scale, 12, 10);
  const headMesh = new THREE.Mesh(headGeo, trackSkin(skinMat.clone()));
  headMesh.position.y = 1.78 * scale;
  headMesh.position.z = 0.18 * scale;
  headMesh.scale.set(0.95, 1.05, 1.1);
  group.add(headMesh);
  group.userData.headMesh = headMesh;
  // Neck sinew connecting skull to torso
  const dNeck = new THREE.Mesh(new THREE.CylinderGeometry(0.048 * scale, 0.075 * scale, 0.46 * scale, 8), trackSkin(skinMat.clone()));
  dNeck.position.set(0, 1.5 * scale, 0.15 * scale);
  dNeck.rotation.x = 0.3;
  group.add(dNeck);

  // Per-enemy head glow light (perf-capped; bosses prioritized & brighter)
  if (activeEnemyLights < MAX_ENEMY_LIGHTS) {
    const eLight = isBoss
      ? new THREE.PointLight(0xff3355, 1.6, 9, 2)
      : new THREE.PointLight(0xaa2233, 0.9, 5, 2);
    eLight.position.set(0, 1.85 * scale, 0.4 * scale);
    group.add(eLight);
    group.userData.enemyLight = eLight;
    activeEnemyLights++;
  }

  // Flower mouth - 5 fleshy fanged petals (Demogorgon maw)
  const petalGroup = new THREE.Group();
  petalGroup.position.y = 1.78 * scale;
  petalGroup.position.z = 0.5 * scale;
  group.userData.petalGroup = petalGroup;
  group.userData.petalMeshes = [];
  group.userData.mouthOpen = 0;

  const petalMat = new THREE.MeshStandardMaterial({
    color: 0x47201f, emissive: 0xc01f3a, emissiveIntensity: 0.6,
    roughness: 0.78, side: THREE.DoubleSide
  });
  const fangMat = new THREE.MeshStandardMaterial({ color: 0xefe6d6, emissive: 0x4a3a2c, emissiveIntensity: 0.3, roughness: 0.35 });

  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2;
    const petal = new THREE.Group();
    const ca = Math.cos(angle), sa = Math.sin(angle);
    const L = 0.19 * scale, baseR = 0.06 * scale, spreadR = 0.12 * scale, halfW = 0.16 * scale, cup = 0.09 * scale;
    // radial (outward in flower plane) and tangential basis
    const rx = ca, ry = sa, tx = -sa, ty = ca;
    const NU = 6, NV = 5;
    const verts = [];
    const vert = (u, v) => {
      const w = halfW * Math.sin(Math.PI * Math.pow(u, 0.75)) * (1 - 0.55 * u);
      const rad = baseR + u * spreadR - Math.sin(Math.PI * u) * (1 - Math.abs(v)) * cup;
      const fwd = u * L;
      const x = rx * rad + tx * (v * w);
      const y = ry * rad + ty * (v * w);
      return [x, y, fwd];
    };
    for (let a = 0; a < NU; a++) {
      for (let b = 0; b < NV; b++) {
        const u0 = a / NU, u1 = (a + 1) / NU;
        const v0 = -1 + 2 * b / NV, v1 = -1 + 2 * (b + 1) / NV;
        const p00 = vert(u0, v0), p10 = vert(u1, v0), p11 = vert(u1, v1), p01 = vert(u0, v1);
        verts.push(...p00, ...p10, ...p11, ...p00, ...p11, ...p01);
      }
    }
    const petalGeo = new THREE.BufferGeometry();
    petalGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
    petalGeo.computeVertexNormals();
    petal.add(new THREE.Mesh(petalGeo, petalMat));
    // Curved row of fangs down each edge, longest mid-petal
    for (let t = 0; t < 6; t++) {
      const u = 0.12 + t * 0.15;
      const flen = (0.08 + Math.sin(Math.PI * u) * 0.1) * scale;
      [-1, 1].forEach(edge => {
        const [bx, by, bz] = vert(u, edge * 0.92);
        const fang = new THREE.Mesh(new THREE.ConeGeometry(0.02 * scale, flen, 5), fangMat);
        fang.position.set(bx, by, bz);
        fang.lookAt(rx * 0.02, ry * 0.02, bz + 0.35 * scale);
        petal.add(fang);
      });
    }
    petal.userData.baseAngle = angle;
    petal.userData.petalIdx = i;
    petalGroup.add(petal);
    group.userData.petalMeshes.push(petal);
  }

  // Gum ring of fangs around the central maw (visible even half-open)
  for (let g2 = 0; g2 < 14; g2++) {
    const a = (g2 / 14) * Math.PI * 2;
    const rr = 0.09 * scale;
    const fang = new THREE.Mesh(new THREE.ConeGeometry(0.018 * scale, 0.13 * scale, 5), fangMat);
    fang.position.set(Math.cos(a) * rr, Math.sin(a) * rr, 0.02 * scale);
    fang.lookAt(0, 0, 0.5 * scale);
    petalGroup.add(fang);
  }

  // Deep wet gullet + pulsing inner glow (throatMesh)
  const gullet = new THREE.Mesh(
    new THREE.ConeGeometry(0.1 * scale, 0.16 * scale, 14, 1, true),
    new THREE.MeshStandardMaterial({ color: 0x2a0810, emissive: 0x6a0a1e, emissiveIntensity: 0.7, roughness: 0.6, side: THREE.DoubleSide })
  );
  gullet.position.z = -0.16 * scale;
  gullet.rotation.x = -Math.PI / 2;
  petalGroup.add(gullet);
  const throat = new THREE.Mesh(
    new THREE.SphereGeometry(0.075 * scale, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0xff3a55, toneMapped: false })
  );
  throat.position.z = -0.12 * scale;
  petalGroup.add(throat);
  group.userData.throatMesh = throat;
  // Wet tongue nub
  const tongue = new THREE.Mesh(
    new THREE.SphereGeometry(0.05 * scale, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x8a2030, emissive: 0x5a1020, emissiveIntensity: 0.6, roughness: 0.3 })
  );
  tongue.scale.set(1, 0.6, 1.5);
  tongue.position.z = -0.02 * scale;
  petalGroup.add(tongue);
  // Fine stringy drool
  const droolMat = new THREE.MeshStandardMaterial({ color: 0xc2cf86, emissive: 0x3a4a18, emissiveIntensity: 0.5, transparent: true, opacity: 0.65, roughness: 0.35 });
  for (let d = 0; d < 5; d++) {
    const a = (d / 5) * Math.PI * 2 + 0.3;
    const len = (0.16 + Math.random() * 0.26) * scale;
    const drip = new THREE.Mesh(new THREE.CylinderGeometry(0.009 * scale, 0.003 * scale, len, 4), droolMat);
    drip.position.set(Math.cos(a) * 0.12 * scale, -len / 2 - 0.04 * scale, Math.sin(a) * 0.05 * scale + 0.05 * scale);
    petalGroup.add(drip);
  }
  group.add(petalGroup);

  // Nail/claw material - pale and sharp
  const nailMat = new THREE.MeshStandardMaterial({ color: 0xd9cdbf, emissive: 0x2a2018, emissiveIntensity: 0.35, roughness: 0.6 });
  // Builds a hand/foot with `n` fingers, each tipped with a pointed nail
  function buildDigits(parent, n, fingerLen, fingerR, spread, baseY, baseZ, dir) {
    for (let f = 0; f < n; f++) {
      const off = (f - (n - 1) / 2) * spread;
      const finger = new THREE.Mesh(new THREE.CapsuleGeometry(fingerR, fingerLen, 4, 6), skinMat.clone());
      finger.position.set(off, baseY - dir.y * fingerLen * 0.5, baseZ + dir.z * fingerLen * 0.5);
      finger.rotation.x = dir.rot;
      parent.add(finger);
      const nail = new THREE.Mesh(new THREE.ConeGeometry(fingerR * 1.05, fingerLen * 0.55, 4), nailMat);
      nail.position.set(off, baseY - dir.y * fingerLen * 1.05, baseZ + dir.z * fingerLen * 1.05);
      nail.rotation.x = dir.rot + (dir.y > 0 ? Math.PI : 0);
      parent.add(nail);
    }
  }

  // Two legs (bipedal), each on a hip pivot so it lifts when walking
  group.userData.legPivots = [];
  [-1, 1].forEach((side, idx) => {
    const pivot = new THREE.Group();
    pivot.position.set(side * 0.16 * scale, 0.92 * scale, 0.05 * scale);
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.05 * scale, 0.5 * scale, 4, 6), skinMat.clone());
    thigh.position.set(0, -0.28 * scale, 0.02 * scale);
    pivot.add(thigh);
    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.038 * scale, 0.46 * scale, 4, 6), skinMat.clone());
    shin.position.set(0, -0.66 * scale, -0.04 * scale);
    pivot.add(shin);
    // Foot pad + 4 toes with nails
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.13 * scale, 0.05 * scale, 0.16 * scale), skinMat.clone());
    foot.position.set(0, -0.9 * scale, 0.06 * scale);
    pivot.add(foot);
    buildDigits(pivot, 4, 0.13 * scale, 0.022 * scale, 0.04 * scale,
      -0.9 * scale, 0.13 * scale, { y: 0, z: 1, rot: Math.PI / 2 });
    pivot.userData.legIdx = idx;
    group.add(pivot);
    group.userData.legPivots.push(pivot);
  });

  // Two arms on shoulder pivots so they can swipe when attacking
  group.userData.armPivots = [];
  [-1, 1].forEach((side, ai) => {
    const pivot = new THREE.Group();
    pivot.position.set(side * 0.3 * scale, 1.35 * scale, 0.05 * scale);

    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.04 * scale, 0.66 * scale, 4, 8), skinMat.clone());
    upper.position.set(side * 0.04 * scale, -0.17 * scale, 0.15 * scale);
    upper.rotation.z = side * 0.55;
    upper.rotation.x = -0.6;
    pivot.add(upper);

    const fore = new THREE.Mesh(new THREE.CapsuleGeometry(0.032 * scale, 0.58 * scale, 4, 8), skinMat.clone());
    fore.position.set(side * 0.22 * scale, -0.57 * scale, 0.55 * scale);
    fore.rotation.z = side * 0.5;
    fore.rotation.x = -1.05;
    pivot.add(fore);

    // Hand: small palm + 4 long clawed fingers
    const hand = new THREE.Group();
    hand.position.set(side * 0.32 * scale, -0.83 * scale, 0.87 * scale);
    const palm = new THREE.Mesh(new THREE.SphereGeometry(0.05 * scale, 8, 6), skinMat.clone());
    palm.scale.set(1, 0.7, 1.1);
    hand.add(palm);
    buildDigits(hand, 4, 0.17 * scale, 0.018 * scale, 0.045 * scale,
      0, 0.05 * scale, { y: 0, z: 1, rot: Math.PI / 2 - 0.2 });
    pivot.add(hand);

    pivot.userData.armIdx = ai;
    group.add(pivot);
    group.userData.armPivots.push(pivot);
  });

  group.castShadow = true;
  // Use real art (demogorgon.glb / demogorgon.png) if present, else this model
  applyCharacterArt(group, { name: 'demogorgon', height: (isBoss ? 3.6 : 2.3), yOffset: 0 });
  return group;
}

function buildDemodog() {
  const group = new THREE.Group();
  const scale = 0.7;
  const skinMat = new THREE.MeshStandardMaterial({ color: 0x8f8275, emissive: 0x322820, emissiveIntensity: 0.55, roughness: 0.95, metalness: 0 });
  const veinMat = new THREE.MeshBasicMaterial({ color: 0xff3355, toneMapped: false });
  group.userData.skinMats = [];
  const trackSkin = m => { group.userData.skinMats.push(m); return m; };

  // Low body
  const bodyGeo = new THREE.CapsuleGeometry(0.22 * scale, 0.55 * scale, 4, 8);
  const bodyMesh = new THREE.Mesh(bodyGeo, trackSkin(skinMat.clone()));
  bodyMesh.position.y = 0.38 * scale;
  bodyMesh.rotation.x = Math.PI / 2;
  group.add(bodyMesh);

  // Glowing spine ridge along the back
  for (let i = 0; i < 5; i++) {
    const r = new THREE.Mesh(new THREE.ConeGeometry(0.04 * scale, 0.12 * scale, 4), veinMat);
    r.position.set(0, 0.55 * scale, (0.25 - i * 0.18) * scale);
    group.add(r);
  }

  // Elongated snout
  const snoutGeo = new THREE.CapsuleGeometry(0.13 * scale, 0.3 * scale, 4, 8);
  const snout = new THREE.Mesh(snoutGeo, trackSkin(skinMat.clone()));
  snout.position.set(0, 0.42 * scale, 0.4 * scale);
  snout.rotation.x = Math.PI / 2;
  group.add(snout);

  // Eyes (glowing amber)
  [-0.1, 0.1].forEach(x => {
    const eGeo = new THREE.SphereGeometry(0.05 * scale, 5, 5);
    const eMat = new THREE.MeshBasicMaterial({ color: 0xffae00, toneMapped: false });
    const eye = new THREE.Mesh(eGeo, eMat);
    eye.position.set(x * scale, 0.55 * scale, 0.32 * scale);
    group.add(eye);
  });

  // Flower mouth petals (4 smaller)
  const petalGroup = new THREE.Group();
  petalGroup.position.set(0, 0.42 * scale, 0.66 * scale);
  group.userData.petalGroup = petalGroup;
  group.userData.petalMeshes = [];
  group.userData.mouthOpen = 0;

  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const s = 0.1 * scale;
    const petalGeo = new THREE.BufferGeometry();
    const verts = new Float32Array([
      0, 0, 0,
      Math.cos(angle - 0.3) * s, Math.sin(angle - 0.3) * s, 0,
      Math.cos(angle) * s * 0.7, Math.sin(angle) * s * 0.7, s * 1.2,
      0, 0, 0,
      Math.cos(angle + 0.3) * s, Math.sin(angle + 0.3) * s, 0,
      Math.cos(angle) * s * 0.7, Math.sin(angle) * s * 0.7, s * 1.2,
    ]);
    petalGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    petalGeo.computeVertexNormals();
    const petal = new THREE.Mesh(petalGeo, new THREE.MeshStandardMaterial({ color: 0x6e2a28, emissive: 0xff2a55, emissiveIntensity: 0.9, roughness: 0.8, side: THREE.DoubleSide }));
    petal.userData.baseAngle = angle;
    petalGroup.add(petal);
    group.userData.petalMeshes.push(petal);
  }
  const igGeo = new THREE.CircleGeometry(0.08 * scale, 8);
  const igMat = new THREE.MeshBasicMaterial({ color: 0xff2a55, toneMapped: false });
  petalGroup.add(new THREE.Mesh(igGeo, igMat));
  const dThroat = new THREE.Mesh(new THREE.SphereGeometry(0.06 * scale, 6, 6), new THREE.MeshBasicMaterial({ color: 0xff4466, toneMapped: false }));
  dThroat.position.z = -0.05 * scale;
  petalGroup.add(dThroat);
  group.userData.throatMesh = dThroat;
  group.add(petalGroup);

  // Per-demodog head glow (perf-capped)
  if (activeEnemyLights < MAX_ENEMY_LIGHTS) {
    const dLight = new THREE.PointLight(0xaa2233, 0.9, 5, 2);
    dLight.position.set(0, 0.5 * scale, 0.4 * scale);
    group.add(dLight);
    group.userData.enemyLight = dLight;
    activeEnemyLights++;
  }

  // 4 legs low to ground
  [[0.18, 0.3], [-0.18, 0.3], [0.18, -0.3], [-0.18, -0.3]].forEach(([x, z]) => {
    const legGeo = new THREE.CapsuleGeometry(0.055 * scale, 0.28 * scale, 3, 5);
    const leg = new THREE.Mesh(legGeo, trackSkin(skinMat.clone()));
    leg.position.set(x * scale, 0.15 * scale, z * scale);
    leg.rotation.z = x > 0 ? 0.2 : -0.2;
    group.add(leg);
  });

  group.castShadow = true;
  return group;
}

function createBullet(origin, direction) {
  const mesh = new THREE.Group();
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffccee, toneMapped: false })
  );
  mesh.add(core);
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.24, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff66cc, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  mesh.add(halo);
  mesh.position.copy(origin);
  scene.add(mesh);
  const b = { mesh, dir: direction.clone().normalize(), dist: 0, alive: true };
  bullets.push(b);

  // Bright muzzle/cast flash sprite at the origin
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff88dd, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  flash.position.copy(origin);
  scene.add(flash);
  let fl = 0;
  const animFlash = () => {
    fl += 0.18;
    flash.scale.setScalar(1 + fl * 2.5);
    flash.material.opacity = Math.max(0, 0.95 - fl * 1.8);
    if (flash.material.opacity <= 0) { scene.remove(flash); }
    else requestAnimationFrame(animFlash);
  };
  animFlash();
}

function spawnParticles(pos, count, color) {
  const total = particles.length;
  const allowed = Math.min(count, MAX_PARTICLES - total);
  for (let i = 0; i < allowed; i++) {
    const geo = new THREE.SphereGeometry(0.07 + Math.random() * 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 6,
      Math.random() * 4 + 1,
      (Math.random() - 0.5) * 6
    );
    particles.push({ mesh, vel, life: 0.6 + Math.random() * 0.4, age: 0 });
  }
}

const walls = [];
// Block movement through wall boxes (oriented-box vs circle, slide along faces)
function resolveWallCollision(x, z, r) {
  for (const wall of walls) {
    const p = wall.geometry.parameters;
    const theta = wall.rotation.y;
    const cos = Math.cos(theta), sin = Math.sin(theta);
    const dx = x - wall.position.x, dz = z - wall.position.z;
    let lx = dx * cos + dz * sin;
    let lz = -dx * sin + dz * cos;
    const hw = p.width / 2 + r, hd = p.depth / 2 + r;
    if (Math.abs(lx) < hw && Math.abs(lz) < hd) {
      if (hw - Math.abs(lx) < hd - Math.abs(lz)) lx = Math.sign(lx || 1) * hw;
      else lz = Math.sign(lz || 1) * hd;
      x = wall.position.x + lx * cos - lz * sin;
      z = wall.position.z + lx * sin + lz * cos;
    }
  }
  return [x, z];
}

function startWave(waveNum) {
  playWaveStart();
  const isBoss = waveNum % BOSS_WAVE_INTERVAL === 0;
  const count = 3 + waveNum * 2;
  const announceEl = document.getElementById('wave-announce');
  const titleEl = document.getElementById('wave-title');
  const subEl = document.getElementById('wave-subtitle');

  titleEl.textContent = isBoss ? `WAVE ${waveNum} - BOSS!` : `WAVE ${waveNum}`;
  subEl.textContent = isBoss ? 'MEGA DEMOGORGON APPROACHES' : "THEY'RE COMING";
  announceEl.style.opacity = '1';
  gameState.announceTimer = 2.2;

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (!gameState.running) return;
      const angle = Math.random() * Math.PI * 2;
      const dist = ENEMY_SPAWN_MIN + Math.random() * (ENEMY_SPAWN_MAX - ENEMY_SPAWN_MIN);
      const spawnX = player.pos.x + Math.cos(angle) * dist;
      const spawnZ = player.pos.z + Math.sin(angle) * dist;

      const isDemodog = waveNum >= 3 && !isBoss && Math.random() < 0.4;
      const mesh = isDemodog ? buildDemodog() : buildDemogorgon(isBoss);
      mesh.position.set(
        Math.max(-WORLD_SIZE + 1, Math.min(WORLD_SIZE - 1, spawnX)),
        0,
        Math.max(-WORLD_SIZE + 1, Math.min(WORLD_SIZE - 1, spawnZ))
      );
      scene.add(mesh);

      const baseHp = isDemodog ? 40 : 100;
      const hp = isBoss ? baseHp * 8 : baseHp + (waveNum - 1) * 15;
      const speed = isDemodog ? 4.2 : 2.2 + waveNum * 0.15;

      // Health bar
      const hbGeo = new THREE.PlaneGeometry(0.8, 0.08);
      const hbMat = new THREE.MeshBasicMaterial({ color: 0xff2222, toneMapped: false });
      const hbMesh = new THREE.Mesh(hbGeo, hbMat);
      hbMesh.position.y = (isDemodog ? 1.0 : 2.5) * (isBoss ? 1.6 : 1.0) + 0.3;
      mesh.add(hbMesh);

      const hbBgGeo = new THREE.PlaneGeometry(0.8, 0.08);
      const hbBgMat = new THREE.MeshBasicMaterial({ color: 0x333333, toneMapped: false });
      const hbBgMesh = new THREE.Mesh(hbBgGeo, hbBgMat);
      hbBgMesh.position.y = (isDemodog ? 1.0 : 2.5) * (isBoss ? 1.6 : 1.0) + 0.28;
      hbBgMesh.position.z = -0.01;
      mesh.add(hbBgMesh);

      enemies.push({
        mesh,
        hp,
        maxHp: hp,
        speed,
        alive: true,
        type: isDemodog ? 'demodog' : 'demogorgon',
        isBoss,
        attackTimer: 0,
        hbMesh,
        walkPhase: Math.random() * Math.PI * 2,
        mouthAnimTimer: 0
      });
    }, i * 350);
  }
  gameState.waveActive = true;
}

function checkWaveComplete() {
  if (!gameState.waveActive) return;
  if (enemies.filter(e => e.alive).length === 0) {
    gameState.waveActive = false;
    player.wave++;
    setTimeout(() => {
      if (gameState.running) startWave(player.wave);
    }, 3000);
  }
}

function releaseEnemyLight(enemy) {
  if (enemy.mesh && enemy.mesh.userData.enemyLight && enemy._lightReleased !== true) {
    enemy._lightReleased = true;
    activeEnemyLights = Math.max(0, activeEnemyLights - 1);
  }
}

function killEnemy(enemy, bySpecial = false) {
  if (!enemy.alive) return;
  enemy.alive = false;
  releaseEnemyLight(enemy);
  playEnemyDeath();
  addShake(enemy.isBoss ? 0.35 : 0.15);
  scene.remove(enemy.mesh);
  player.enemiesKilled++;
  player.score += (bySpecial ? 100 : 50) * player.wave * gameState.multiplier;
  updateHUD();

  // Combo
  const now = performance.now() / 1000;
  if (now - gameState.comboStart < COMBO_WINDOW) {
    gameState.comboCount++;
  } else {
    gameState.comboStart = now;
    gameState.comboCount = 1;
  }
  if (gameState.comboCount >= 3) {
    gameState.multiplier = 2;
    gameState.comboTimer = 2;
    showCombo('2x COMBO!');
  }

  // Power-up drop
  if (Math.random() < 0.2) {
    const type = Math.random() < 0.5 ? 'eggo' : 'battery';
    spawnPowerUp(enemy.mesh.position.clone(), type);
  }
}

function playerTakeDamage() {
  if (player.invincibleTimer > 0) return;
  player.hp--;
  player.invincibleTimer = 1.5;
  playPlayerHurt();
  addShake(0.35);
  screenFlash(0.28);
  updateHUD();
  if (player.hp <= 0) {
    player.alive = false;
    gameOver();
  }
}

function gameOver() {
  gameState.running = false;
  const ds = document.getElementById('death-screen');
  const stats = document.getElementById('death-stats');
  stats.innerHTML = `SCORE: ${player.score}<br>WAVE REACHED: ${player.wave}<br>ENEMIES KILLED: ${player.enemiesKilled}`;
  ds.style.display = 'flex';
}

function startGame() {
  // Reset state
  player.pos.set(0, 0, 0);
  player.hp = 20;
  player.maxHp = 20;
  player.score = 0;
  player.wave = 1;
  player.enemiesKilled = 0;
  player.alive = true;
  player.shooting = false;
  player.fireTimer = 0;
  player.specialCooldown = 0;
  player.rapidFire = false;
  player.rapidTimer = 0;
  player.walkCycle = 0;
  player.invincibleTimer = 0;
  gameState.running = true;
  gameState.waveActive = false;
  gameState.comboCount = 0;
  gameState.multiplier = 1;
  gameState.comboTimer = 0;

  // Clear old objects
  enemies.forEach(e => { if (e.mesh) scene.remove(e.mesh); });
  enemies.length = 0;
  activeEnemyLights = 0;
  bullets.forEach(b => scene.remove(b.mesh));
  bullets.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;
  powerUps.forEach(p => scene.remove(p.mesh));
  powerUps.length = 0;
  shockwaves.forEach(s => scene.remove(s.mesh));
  shockwaves.length = 0;

  if (!player.mesh) {
    buildElevenModel();
  } else {
    player.mesh.position.set(0, 0, 0);
  }

  updateHUD();
  setTimeout(() => startWave(1), 1500);
}

// ============================================================
// 9. UPDATE LOOP
// ============================================================
const clock = new THREE.Clock();
let cameraAngle = 0;
let cameraAngleV = 0.95;
const cameraRadius = 23;

function updateCamera(dt) {
  const targetX = player.pos.x + Math.sin(cameraAngle) * cameraRadius * Math.cos(cameraAngleV);
  const targetY = player.pos.y + Math.sin(cameraAngleV) * cameraRadius;
  const targetZ = player.pos.z + Math.cos(cameraAngle) * cameraRadius * Math.cos(cameraAngleV);
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.065);
  if (shakeAmt > 0.001) {
    camera.position.x += (Math.random() - 0.5) * shakeAmt;
    camera.position.y += (Math.random() - 0.5) * shakeAmt;
    camera.position.z += (Math.random() - 0.5) * shakeAmt;
    shakeAmt *= Math.pow(0.0001, dt); // fast decay
    if (shakeAmt < 0.01) shakeAmt = 0;
  }
  camera.lookAt(player.pos.x, player.pos.y + 0.8, player.pos.z);
}

function updatePlayer(dt) {
  if (!player.alive || !player.mesh) return;

  // Movement input
  const speed = (player.speedBoost ? PLAYER_SPEED * 1.6 : PLAYER_SPEED);
  const moveVec = new THREE.Vector3();
  const camFwd = new THREE.Vector3(Math.sin(cameraAngle), 0, Math.cos(cameraAngle));
  const camRight = new THREE.Vector3(Math.cos(cameraAngle), 0, -Math.sin(cameraAngle));

  if (keys.w || keys.ArrowUp) moveVec.add(camFwd);
  if (keys.s || keys.ArrowDown) moveVec.sub(camFwd);
  if (keys.a || keys.ArrowLeft) moveVec.sub(camRight);
  if (keys.d || keys.ArrowRight) moveVec.add(camRight);

  // Joystick
  if (joystick.active) {
    const jx = joystick.dx / 60;
    const jz = joystick.dy / 60;
    moveVec.add(camRight.clone().multiplyScalar(jx));
    moveVec.add(camFwd.clone().multiplyScalar(-jz));
  }

  if (moveVec.length() > 0) {
    moveVec.normalize().multiplyScalar(speed * dt);
    let newX = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, player.pos.x + moveVec.x));
    let newZ = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, player.pos.z + moveVec.z));
    [newX, newZ] = resolveWallCollision(newX, newZ, 0.35);
    player.pos.x = newX;
    player.pos.z = newZ;

    // Face movement direction
    if (moveVec.lengthSq() > 0.0001) {
      const targetAngle = Math.atan2(moveVec.x, moveVec.z);
      let currentAngle = player.mesh.rotation.y;
      let diff = targetAngle - currentAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      player.mesh.rotation.y += diff * 0.2;
    }

    // Walk animation
    player.walkCycle += dt * 8;
    player.mesh.children.forEach(child => {
      if (child.userData.isLeg) {
        const swing = Math.sin(player.walkCycle + child.userData.legIdx * Math.PI) * 0.3;
        child.rotation.x = swing;
      }
    });
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0;
  lantern.position.set(player.pos.x, 2.5, player.pos.z);

  // Timers
  if (player.fireTimer > 0) player.fireTimer -= dt;
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
  if (player.specialCooldown > 0) {
    player.specialCooldown -= dt;
    if (player.specialCooldown < 0) player.specialCooldown = 0;
  }
  if (player.rapidTimer > 0) {
    player.rapidTimer -= dt;
    if (player.rapidTimer <= 0) { player.rapidFire = false; player.speedBoost = false; }
  }

  // Auto-aim shooting
  const fireInterval = player.rapidFire ? 0.1 : 1 / FIRE_RATE;
  if ((player.shooting || mobileFireDown) && player.fireTimer <= 0) {
    const nearest = findNearestEnemy();
    if (nearest) {
      const dir = nearest.mesh.position.clone().sub(player.pos).normalize();
      const origin = player.pos.clone().add(new THREE.Vector3(0, 0.8, 0));
      createBullet(origin, dir);
      playShoot();
      player.fireTimer = fireInterval;
      // Hand glow
      if (player.rightHand) {
        player.rightHand.material.opacity = 0.8;
        setTimeout(() => { if (player.rightHand) player.rightHand.material.opacity = 0; }, 100);
      }
    }
  }

  // Special ability bar
  const barEl = document.getElementById('special-bar');
  const pct = player.specialCooldown > 0 ? (1 - player.specialCooldown / SPECIAL_COOLDOWN) * 100 : 100;
  barEl.style.width = pct + '%';

  // Aura pulse - always gently breathing
  if (player.auraMesh) {
    const t = Date.now() * 0.003;
    player.auraMesh.scale.setScalar(1 + Math.sin(t) * 0.1);
    player.auraMesh.material.opacity = 0.12 + Math.sin(t) * 0.04;
    if (player.auraOuter) {
      player.auraOuter.scale.setScalar(1 + Math.sin(t * 0.7 + 1) * 0.14);
      player.auraOuter.material.opacity = 0.06 + Math.sin(t * 0.7) * 0.025;
    }
  }
}

function findNearestEnemy() {
  let nearest = null, minDist = Infinity;
  enemies.forEach(e => {
    if (!e.alive) return;
    const d = e.mesh.position.distanceTo(player.pos);
    if (d < minDist) { minDist = d; nearest = e; }
  });
  return nearest;
}

function updateEnemies(dt) {
  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    const ePos = enemy.mesh.position;
    const pPos = player.pos;
    const dist = ePos.distanceTo(pPos);

    // Move toward player
    if (dist > 0.8) {
      const dir = pPos.clone().sub(ePos).normalize();
      ePos.x += dir.x * enemy.speed * dt;
      ePos.z += dir.z * enemy.speed * dt;
      ePos.x = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, ePos.x));
      ePos.z = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, ePos.z));
      const eR = enemy.isBoss ? 0.7 : (enemy.type === 'demodog' ? 0.3 : 0.45);
      [ePos.x, ePos.z] = resolveWallCollision(ePos.x, ePos.z, eR);
      // Face player
      enemy.mesh.rotation.y = Math.atan2(pPos.x - ePos.x, pPos.z - ePos.z);
    }

    // Walk bob
    enemy.walkPhase += dt * (enemy.type === 'demodog' ? 10 : 6);
    const bobY = Math.sin(enemy.walkPhase) * 0.07;
    ePos.y = bobY;

    // Leg-lift stride animation
    const legPivots = enemy.mesh.userData.legPivots;
    if (legPivots) {
      legPivots.forEach(pivot => {
        const ph = enemy.walkPhase + pivot.userData.legIdx * Math.PI;
        pivot.rotation.x = Math.sin(ph) * 0.7;
        pivot.position.y = pivot.userData.baseY ?? (pivot.userData.baseY = pivot.position.y);
        pivot.position.y += Math.max(0, Math.sin(ph)) * 0.12;
      });
    }

    // Mouth animation
    const mouthOpen = dist < 5.5;
    if (mouthOpen) {
      enemy.mesh.userData.mouthOpen = Math.min(1, enemy.mesh.userData.mouthOpen + dt * 5);
    } else {
      enemy.mesh.userData.mouthOpen = Math.max(0, enemy.mesh.userData.mouthOpen - dt * 4);
    }
    // Aggressive snapping chomp once the maw is open
    const chomp = enemy.mesh.userData.mouthOpen > 0.6 ? Math.abs(Math.sin(enemy.walkPhase * 7)) * 0.45 : 0;
    const mo = Math.min(1.35, enemy.mesh.userData.mouthOpen + chomp);
    if (enemy.mesh.userData.throatMesh) {
      const th = enemy.mesh.userData.throatMesh;
      const pulse = 1 + Math.sin(enemy.walkPhase * 2) * 0.25;
      th.scale.setScalar(0.6 + mo * pulse);
      th.visible = mo > 0.05;
    }
    if (enemy.mesh.userData.petalMeshes) {
      enemy.mesh.userData.petalMeshes.forEach((petal, i) => {
        const baseA = petal.userData.baseAngle;
        petal.rotation.set(mo * -2.4, mo * 0.35 * (i % 2 === 0 ? 1 : -1), baseA * 0.5 * mo);
      });
    }

    // Attack: lunge/pounce + visible arm swipe
    const armPivots = enemy.mesh.userData.armPivots;
    const atkRange = enemy.isBoss ? 3.2 : (enemy.type === 'demodog' ? 1.7 : 2.4);
    if (dist < atkRange) {
      enemy.attackTimer = (enemy.attackTimer || 0) + dt;
      const cyc = enemy.attackTimer % 1.15;
      // Arm swipe: wind back, slash forward, recover
      if (armPivots) {
        let a;
        if (cyc < 0.35) a = -1.1 * (cyc / 0.35);
        else if (cyc < 0.52) a = -1.1 + ((cyc - 0.35) / 0.17) * 2.3;
        else a = 1.2 * Math.max(0, 1 - (cyc - 0.52) / 0.6);
        armPivots.forEach((p, ai) => {
          p.rotation.x = a * (ai === 0 ? 1 : 0.85);
          p.rotation.z = (ai === 0 ? 1 : -1) * 0.25 * Math.sin(cyc * 7);
        });
      }
      // Pounce hop toward the player around the strike
      if (cyc > 0.18 && cyc < 0.52) {
        const ld = pPos.clone().sub(ePos); ld.y = 0; ld.normalize();
        const ls = enemy.isBoss ? 4.5 : 7;
        ePos.x += ld.x * ls * dt;
        ePos.z += ld.z * ls * dt;
        const lr = enemy.isBoss ? 0.7 : (enemy.type === 'demodog' ? 0.3 : 0.45);
        [ePos.x, ePos.z] = resolveWallCollision(ePos.x, ePos.z, lr);
        ePos.y = bobY + Math.sin((cyc - 0.18) / 0.34 * Math.PI) * 0.55;
      }
      // Damage lands on the strike frame
      if (cyc < 0.08) enemy._struck = false;
      if (!enemy._struck && cyc > 0.44 && cyc < 0.56 && dist < atkRange) {
        playerTakeDamage();
        enemy._struck = true;
      }
    } else {
      enemy.attackTimer = 0;
      enemy._struck = false;
      if (armPivots) armPivots.forEach(p => { p.rotation.x *= 0.85; p.rotation.z *= 0.85; });
    }

    // Update health bar
    if (enemy.hbMesh) {
      const pct = enemy.hp / enemy.maxHp;
      enemy.hbMesh.scale.x = pct;
      enemy.hbMesh.position.x = -(1 - pct) * 0.4;
      enemy.hbMesh.lookAt(camera.position);
    }
  });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.alive) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
    const move = b.dir.clone().multiplyScalar(BULLET_SPEED * dt);
    b.mesh.position.add(move);
    b.dist += move.length();
    if (b.dist > BULLET_RANGE) { b.alive = false; continue; }

    // Hit enemies
    let hit = false;
    for (const enemy of enemies) {
      if (!enemy.alive) continue;
      if (b.mesh.position.distanceTo(enemy.mesh.position) < (enemy.isBoss ? 1.2 : 0.7)) {
        const dmg = player.rapidFire ? 30 : 20;
        enemy.hp -= dmg;
        playHitEnemy();
        // Brief white emissive flash on the body
        const mats = enemy.mesh.userData.skinMats;
        if (mats && !enemy._flashing) {
          enemy._flashing = true;
          mats.forEach(m => { m.userData._e = m.emissive.getHex(); m.userData._ei = m.emissiveIntensity; m.emissive.setHex(0xffffff); m.emissiveIntensity = 1.4; });
          setTimeout(() => {
            mats.forEach(m => { m.emissive.setHex(m.userData._e ?? 0x7a3a2a); m.emissiveIntensity = m.userData._ei ?? 0.8; });
            enemy._flashing = false;
          }, 70);
        }
        if (enemy.hp <= 0) killEnemy(enemy);
        b.alive = false;
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = 1 - p.age / p.life;
  }
}

function updatePowerUps(dt) {
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (!pu.alive) { scene.remove(pu.mesh); powerUps.splice(i, 1); continue; }
    pu.mesh.rotation.y += dt * 2.0;
    pu.mesh.position.y = 0.6 + Math.sin(Date.now() * 0.0025 + i) * 0.2;
    const halo = pu.mesh.children.find(c => c.userData.isHalo);
    if (halo) halo.scale.setScalar(1 + Math.sin(Date.now() * 0.005 + i) * 0.18);
    if (pu.mesh.position.distanceTo(player.pos) < 1.2) {
      playPowerUp();
      if (pu.type === 'eggo') {
        player.hp = Math.min(player.maxHp, player.hp + 3);
      } else {
        player.rapidFire = true;
        player.speedBoost = true;
        player.rapidTimer = 5;
      }
      updateHUD();
      pu.alive = false;
    }
  }
}

function updateShockwaves(dt) {
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const sw = shockwaves[i];
    if (!sw.alive) { scene.remove(sw.mesh); shockwaves.splice(i, 1); continue; }
    sw.scale += dt * 20;
    sw.mesh.scale.setScalar(sw.scale);
    sw.mat.opacity = Math.max(0, 0.8 - sw.scale * 0.065);
    if (sw.scale > 12) { sw.alive = false; }
  }
}

function updateSpores(dt) {
  const t = Date.now() * 0.001;
  spores.forEach(s => {
    s.position.y = s.userData.baseY + Math.sin(t * s.userData.freq + s.userData.phase) * 0.4;
    s.position.x += s.userData.driftX;
    s.position.z += s.userData.driftZ;
    if (Math.abs(s.position.x) > WORLD_SIZE) s.userData.driftX *= -1;
    if (Math.abs(s.position.z) > WORLD_SIZE) s.userData.driftZ *= -1;
  });
  // Embers drift upward, reset at the top
  embers.forEach(e => {
    e.position.y += e.userData.rise * dt;
    e.position.x += Math.sin(t * 0.5 + e.userData.sway) * 0.004;
    if (e.position.y > 9) {
      e.position.y = 0;
      e.position.x = (Math.random() - 0.5) * WORLD_SIZE * 2;
      e.position.z = (Math.random() - 0.5) * WORLD_SIZE * 2;
    }
  });
  // Snow drifts down and gently sways, recycling at the top
  snow.forEach(f => {
    f.position.y -= f.userData.fall * dt;
    f.position.x += Math.sin(t * f.userData.swaySpeed + f.userData.sway) * f.userData.swayAmp * dt;
    if (f.position.y < 0) {
      f.position.y = 12 + Math.random() * 2;
      f.position.x = (Math.random() - 0.5) * WORLD_SIZE * 2.1;
      f.position.z = (Math.random() - 0.5) * WORLD_SIZE * 2.1;
    }
  });
  // Boundary glow pulse
  const bp = 0.7 + Math.sin(t * 3) * 0.25;
  boundaryGlows.forEach(g => { g.material.opacity = bp; });
}

function triggerSpecial() {
  if (player.specialCooldown > 0 || !player.alive) return;
  player.specialCooldown = SPECIAL_COOLDOWN;
  playSpecialAbility();
  addShake(0.45);
  createShockwave(player.pos.clone());

  // Nosebleed effect
  player.nosebleed.forEach(nb => { nb.visible = true; });
  setTimeout(() => { player.nosebleed.forEach(nb => { nb.visible = false; }); }, 800);

  // AoE damage
  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    const dist = enemy.mesh.position.distanceTo(player.pos);
    if (dist < SPECIAL_RADIUS) {
      const pushDir = enemy.mesh.position.clone().sub(player.pos).normalize();
      enemy.mesh.position.addScaledVector(pushDir, (SPECIAL_RADIUS - dist) * 0.5);
      enemy.hp -= SPECIAL_DAMAGE;
      if (enemy.hp <= 0) killEnemy(enemy, true);
    }
  });
}

const gameTimers = { announce: 0, combo: 0 };

function updateGameTimers(dt) {
  if (gameState.announceTimer > 0) {
    gameState.announceTimer -= dt;
    if (gameState.announceTimer <= 0) {
      document.getElementById('wave-announce').style.opacity = '0';
    }
  }
  if (gameState.comboTimer > 0) {
    gameState.comboTimer -= dt;
    if (gameState.comboTimer <= 0) {
      gameState.multiplier = 1;
      document.getElementById('combo-display').style.opacity = '0';
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState.running) {
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    updatePowerUps(dt);
    updateShockwaves(dt);
    updateSpores(dt);
    updateCamera(dt);
    updateGameTimers(dt);
    checkWaveComplete();
  } else {
    updateCamera(dt);
  }

  composer.render();
}

// 10. INPUT HANDLING
// ============================================================
const keys = {};
let mobileFireDown = false;

// Prevent pinch-zoom, double-tap-zoom, pull-to-refresh
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive: false }));
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTouchEnd < 300) e.preventDefault();
  _lastTouchEnd = now;
}, { passive: false });

const joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, id: null };
let cameraTouchId = null, cameraTouchLastX = 0, cameraTouchLastY = 0;
let mouseDown = false, lastMouseX = 0, lastMouseY = 0;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); if (gameState.running) triggerSpecial(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.addEventListener('mousedown', e => {
  if (!gameState.running) return;
  initAudio();
  mouseDown = true;
  lastMouseX = e.clientX; lastMouseY = e.clientY;
  if (e.clientX > window.innerWidth * 0.5) {
    player.shooting = true;
  }
});
document.addEventListener('mouseup', () => {
  mouseDown = false;
  player.shooting = false;
});
document.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  if (e.clientX > window.innerWidth * 0.5) {
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    cameraAngle -= dx * 0.005;
    cameraAngleV = Math.max(0.2, Math.min(1.2, cameraAngleV + dy * 0.004));
  }
  lastMouseX = e.clientX; lastMouseY = e.clientY;
});

// Mobile touch controls
const joystickZone = document.getElementById('joystick-zone');
joystickZone.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  const t = e.changedTouches[0];
  joystick.active = true; joystick.id = t.identifier;
  joystick.startX = t.clientX; joystick.startY = t.clientY;
  joystick.dx = 0; joystick.dy = 0;
}, { passive: false });
joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      joystick.dx = Math.max(-60, Math.min(60, t.clientX - joystick.startX));
      joystick.dy = Math.max(-60, Math.min(60, t.clientY - joystick.startY));
      const k = document.getElementById('joystick-knob');
      k.style.transform = `translate(calc(-50% + ${joystick.dx}px), calc(-50% + ${joystick.dy}px))`;
    }
  }
}, { passive: false });
joystickZone.addEventListener('touchend', e => {
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
  const k = document.getElementById('joystick-knob');
  k.style.transform = 'translate(-50%, -50%)';
});

const fireBtn = document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); mobileFireDown = true; }, { passive: false });
fireBtn.addEventListener('touchend', () => { mobileFireDown = false; });

const powerBtn = document.getElementById('power-btn');
powerBtn.addEventListener('touchstart', e => { e.preventDefault(); if (gameState.running) triggerSpecial(); }, { passive: false });

// Camera rotation via right-side touch
canvas.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (t.clientX > window.innerWidth * 0.5 && !cameraTouchId) {
      cameraTouchId = t.identifier;
      cameraTouchLastX = t.clientX;
      cameraTouchLastY = t.clientY;
    }
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === cameraTouchId) {
      cameraAngle -= (t.clientX - cameraTouchLastX) * 0.006;
      cameraAngleV = Math.max(0.2, Math.min(1.2, cameraAngleV + (t.clientY - cameraTouchLastY) * 0.005));
      cameraTouchLastX = t.clientX;
      cameraTouchLastY = t.clientY;
    }
  }
}, { passive: true });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === cameraTouchId) cameraTouchId = null;
  }
});

// ============================================================
// 11. UI HELPERS
// ============================================================
function updateHUD() {
  document.getElementById('score').textContent = `SCORE: ${player.score}`;
  document.getElementById('wave-info').textContent = `WAVE ${player.wave}`;
  document.getElementById('lives').textContent = `❤️ ${player.hp}`;
}

function showCombo(text) {
  const el = document.getElementById('combo-display');
  el.textContent = text;
  el.style.opacity = '1';
}

// Build start screen lights
function buildStartLights() {
  const row = document.getElementById('lights-row');
  const colors = ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#ff00ff','#ffffff','#00ffff'];
  for (let i = 0; i < 24; i++) {
    const b = document.createElement('div');
    b.className = 'bulb';
    b.style.background = colors[i % colors.length];
    b.style.color = colors[i % colors.length];
    b.style.animationDelay = `${(i * 0.18) % 1.5}s`;
    row.appendChild(b);
  }
}

// Button handlers
document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  gameState.started = true;
  gameState.running = true;
  startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('death-screen').style.display = 'none';
  startGame();
});

// Init
buildStartLights();
buildEnvironment();

// Initial camera position
camera.position.set(0, 17, -13);
camera.lookAt(0, 0, 0);

animate();
</script>
