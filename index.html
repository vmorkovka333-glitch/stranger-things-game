function createBullet(origin, direction) {
  const mesh = new THREE.Group();
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffccee, toneMapped: false })
  );
  mesh.add(core);
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.24, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff66cc, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  mesh.add(halo);
  mesh.position.copy(origin);
  scene.add(mesh);
  const b = { mesh, dir: direction.clone().normalize(), dist: 0, alive: true };
  bullets.push(b);

  // Bright muzzle/cast flash sprite at the origin
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff88dd, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  flash.position.copy(origin);
  scene.add(flash);
  let fl = 0;
  const animFlash = () => {
    fl += 0.18;
    flash.scale.setScalar(1 + fl * 2.5);
    flash.material.opacity = Math.max(0, 0.95 - fl * 1.8);
    if (flash.material.opacity <= 0) { scene.remove(flash); }
    else requestAnimationFrame(animFlash);
  };
  animFlash();
}

function spawnParticles(pos, count, color) {
  const total = particles.length;
  const allowed = Math.min(count, MAX_PARTICLES - total);
  for (let i = 0; i < allowed; i++) {
    const geo = new THREE.SphereGeometry(0.07 + Math.random() * 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 6,
      Math.random() * 4 + 1,
      (Math.random() - 0.5) * 6
    );
    particles.push({ mesh, vel, life: 0.6 + Math.random() * 0.4, age: 0 });
  }
}

function spawnPowerUp(pos, type) {
  const group = new THREE.Group();
  if (type === 'eggo') {
    // Waffle shape
    const wGeo = new THREE.BoxGeometry(0.45, 0.08, 0.45);
    const wMat = new THREE.MeshBasicMaterial({ color: 0xffcc44, toneMapped: false });
    const waffle = new THREE.Mesh(wGeo, wMat);
    group.add(waffle);
    // Grid lines
    for (let i = -1; i <= 1; i++) {
      const g1 = new THREE.BoxGeometry(0.42, 0.1, 0.02);
      const g2 = new THREE.BoxGeometry(0.02, 0.1, 0.42);
      const lm = new THREE.MeshBasicMaterial({ color: 0xcc9922 });
      const l1 = new THREE.Mesh(g1, lm); l1.position.z = i * 0.13;
      const l2 = new THREE.Mesh(g2, lm); l2.position.x = i * 0.13;
      group.add(l1, l2);
    }
  } else {
    // Battery
    const bGeo = new THREE.BoxGeometry(0.2, 0.45, 0.12);
    const bMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, toneMapped: false });
    const batt = new THREE.Mesh(bGeo, bMat);
    group.add(batt);
    const capGeo = new THREE.BoxGeometry(0.1, 0.06, 0.1);
    const capMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = 0.26;
    group.add(cap);
  }
  // Bright glow halo so it's obviously collectible
  const haloColor = type === 'eggo' ? 0xffcc44 : 0x44aaff;
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 10, 10),
    new THREE.MeshBasicMaterial({ color: haloColor, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  halo.userData.isHalo = true;
  group.add(halo);
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 1.4, 6),
    new THREE.MeshBasicMaterial({ color: haloColor, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  beam.position.y = -0.4;
  group.add(beam);
  group.position.copy(pos);
  group.position.y = 0.5;
  scene.add(group);
  powerUps.push({ mesh: group, type, alive: true });
}

function createShockwave(pos) {
  const geo = new THREE.RingGeometry(0.1, 0.8, 48);
  const mat = new THREE.MeshBasicMaterial({ color: 0xcc66ff, transparent: true, opacity: 0.95, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.copy(pos);
  ring.position.y = 0.3;
  scene.add(ring);
  shockwaves.push({ mesh: ring, mat, scale: 0.1, alive: true });
  screenFlash(0.5);
}

// Brief full-screen flash overlay
let flashEl = null;
function screenFlash(strength) {
  if (!flashEl) {
    flashEl = document.createElement('div');
    flashEl.style.cssText = 'position:absolute;inset:0;z-index:9;pointer-events:none;background:#cc88ff;opacity:0;transition:opacity 0.45s;';
    document.body.appendChild(flashEl);
  }
  flashEl.style.transition = 'none';
  flashEl.style.opacity = String(strength);
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.45s';
    flashEl.style.opacity = '0';
  });
}

// Juicy camera shake
let shakeAmt = 0;
function addShake(amt) { shakeAmt = Math.min(0.8, shakeAmt + amt); }

// ============================================================
// 8. GAME STATE & WAVES
// ============================================================
const walls = [];
const spores = [];
const embers = [];
const boundaryGlows = [];
const enemies = [];
const bullets = [];
const particles = [];
const powerUps = [];
const shockwaves = [];

const player = {
  mesh: null,
  pos: new THREE.Vector3(0, 0, 0),
  vel: new THREE.Vector3(),
  hp: 20,
  maxHp: 20,
  score: 0,
  wave: 1,
  enemiesKilled: 0,
  alive: true,
  shooting: false,
  fireTimer: 0,
  specialCooldown: 0,
  rapidFire: false,
  rapidTimer: 0,
  speedBoost: false,
  auraMesh: null,
  nosebleed: [],
  leftHand: null,
  rightHand: null,
  walkCycle: 0,
  invincibleTimer: 0
};

const gameState = {
  running: false,
  started: false,
  waveActive: false,
  announceTimer: 0,
  comboTimer: 0,
  comboCount: 0,
  multiplier: 1,
  comboStart: 0
};

function startWave(waveNum) {
  playWaveStart();
  const isBoss = waveNum % BOSS_WAVE_INTERVAL === 0;
  const count = 3 + waveNum * 2;
  const announceEl = document.getElementById('wave-announce');
  const titleEl = document.getElementById('wave-title');
  const subEl = document.getElementById('wave-subtitle');

  titleEl.textContent = isBoss ? `WAVE ${waveNum} - BOSS!` : `WAVE ${waveNum}`;
  subEl.textContent = isBoss ? 'MEGA DEMOGORGON APPROACHES' : "THEY'RE COMING";
  announceEl.style.opacity = '1';
  gameState.announceTimer = 2.2;

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (!gameState.running) return;
      const angle = Math.random() * Math.PI * 2;
      const dist = ENEMY_SPAWN_MIN + Math.random() * (ENEMY_SPAWN_MAX - ENEMY_SPAWN_MIN);
      const spawnX = player.pos.x + Math.cos(angle) * dist;
      const spawnZ = player.pos.z + Math.sin(angle) * dist;

      const isDemodog = waveNum >= 3 && !isBoss && Math.random() < 0.4;
      const mesh = isDemodog ? buildDemodog() : buildDemogorgon(isBoss);
      mesh.position.set(
        Math.max(-WORLD_SIZE + 1, Math.min(WORLD_SIZE - 1, spawnX)),
        0,
        Math.max(-WORLD_SIZE + 1, Math.min(WORLD_SIZE - 1, spawnZ))
      );
      scene.add(mesh);

      const baseHp = isDemodog ? 40 : 100;
      const hp = isBoss ? baseHp * 8 : baseHp + (waveNum - 1) * 15;
      const speed = isDemodog ? 4.2 : 2.2 + waveNum * 0.15;

      // Health bar
      const hbGeo = new THREE.PlaneGeometry(0.8, 0.08);
      const hbMat = new THREE.MeshBasicMaterial({ color: 0xff2222, toneMapped: false });
      const hbMesh = new THREE.Mesh(hbGeo, hbMat);
      hbMesh.position.y = (isDemodog ? 1.0 : 2.5) * (isBoss ? 1.6 : 1.0) + 0.3;
      mesh.add(hbMesh);

      const hbBgGeo = new THREE.PlaneGeometry(0.8, 0.08);
      const hbBgMat = new THREE.MeshBasicMaterial({ color: 0x333333, toneMapped: false });
      const hbBgMesh = new THREE.Mesh(hbBgGeo, hbBgMat);
      hbBgMesh.position.y = (isDemodog ? 1.0 : 2.5) * (isBoss ? 1.6 : 1.0) + 0.28;
      hbBgMesh.position.z = -0.01;
      mesh.add(hbBgMesh);

      enemies.push({
        mesh,
        hp,
        maxHp: hp,
        speed,
        alive: true,
        type: isDemodog ? 'demodog' : 'demogorgon',
        isBoss,
        attackTimer: 0,
        hbMesh,
        walkPhase: Math.random() * Math.PI * 2,
        mouthAnimTimer: 0
      });
    }, i * 350);
  }
  gameState.waveActive = true;
}

function checkWaveComplete() {
  if (!gameState.waveActive) return;
  if (enemies.filter(e => e.alive).length === 0) {
    gameState.waveActive = false;
    player.wave++;
    setTimeout(() => {
      if (gameState.running) startWave(player.wave);
    }, 3000);
  }
}

function releaseEnemyLight(enemy) {
  if (enemy.mesh && enemy.mesh.userData.enemyLight && enemy._lightReleased !== true) {
    enemy._lightReleased = true;
    activeEnemyLights = Math.max(0, activeEnemyLights - 1);
  }
}

function killEnemy(enemy, bySpecial = false) {
  if (!enemy.alive) return;
  enemy.alive = false;
  releaseEnemyLight(enemy);
  playEnemyDeath();
  // Bigger, brighter death burst (red -> orange -> purple), upward dissolve
  spawnParticles(enemy.mesh.position, 24, 0xff3322);
  spawnParticles(enemy.mesh.position, 16, 0xff8800);
  spawnParticles(enemy.mesh.position, 14, 0xcc66ff);
  addShake(enemy.isBoss ? 0.35 : 0.15);
  scene.remove(enemy.mesh);
  player.enemiesKilled++;
  player.score += (bySpecial ? 100 : 50) * player.wave * gameState.multiplier;
  updateHUD();

  // Combo
  const now = performance.now() / 1000;
  if (now - gameState.comboStart < COMBO_WINDOW) {
    gameState.comboCount++;
  } else {
    gameState.comboStart = now;
    gameState.comboCount = 1;
  }
  if (gameState.comboCount >= 3) {
    gameState.multiplier = 2;
    gameState.comboTimer = 2;
    showCombo('2x COMBO!');
  }

  // Power-up drop
  if (Math.random() < 0.2) {
    const type = Math.random() < 0.5 ? 'eggo' : 'battery';
    spawnPowerUp(enemy.mesh.position.clone(), type);
  }
}

function playerTakeDamage() {
  if (player.invincibleTimer > 0) return;
  player.hp--;
  player.invincibleTimer = 1.5;
  playPlayerHurt();
  addShake(0.35);
  screenFlash(0.28);
  updateHUD();
  if (player.hp <= 0) {
    player.alive = false;
    gameOver();
  }
}

function gameOver() {
  gameState.running = false;
  const ds = document.getElementById('death-screen');
  const stats = document.getElementById('death-stats');
  stats.innerHTML = `SCORE: ${player.score}<br>WAVE REACHED: ${player.wave}<br>ENEMIES KILLED: ${player.enemiesKilled}`;
  ds.style.display = 'flex';
}

function startGame() {
  // Reset state
  player.pos.set(0, 0, 0);
  player.hp = 20;
  player.maxHp = 20;
  player.score = 0;
  player.wave = 1;
  player.enemiesKilled = 0;
  player.alive = true;
  player.shooting = false;
  player.fireTimer = 0;
  player.specialCooldown = 0;
  player.rapidFire = false;
  player.rapidTimer = 0;
  player.walkCycle = 0;
  player.invincibleTimer = 0;
  gameState.running = true;
  gameState.waveActive = false;
  gameState.comboCount = 0;
  gameState.multiplier = 1;
  gameState.comboTimer = 0;

  // Clear old objects
  enemies.forEach(e => { if (e.mesh) scene.remove(e.mesh); });
  enemies.length = 0;
  activeEnemyLights = 0;
  bullets.forEach(b => scene.remove(b.mesh));
  bullets.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;
  powerUps.forEach(p => scene.remove(p.mesh));
  powerUps.length = 0;
  shockwaves.forEach(s => scene.remove(s.mesh));
  shockwaves.length = 0;

  if (!player.mesh) {
    buildElevenModel();
  } else {
    player.mesh.position.set(0, 0, 0);
  }

  updateHUD();
  setTimeout(() => startWave(1), 1500);
}

// ============================================================
// 9. UPDATE LOOP
// ============================================================
const clock = new THREE.Clock();
let cameraAngle = 0;
let cameraAngleV = 0.95;
const cameraRadius = 23;

function updateCamera(dt) {
  const targetX = player.pos.x + Math.sin(cameraAngle) * cameraRadius * Math.cos(cameraAngleV);
  const targetY = player.pos.y + Math.sin(cameraAngleV) * cameraRadius;
  const targetZ = player.pos.z + Math.cos(cameraAngle) * cameraRadius * Math.cos(cameraAngleV);
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.065);
  if (shakeAmt > 0.001) {
    camera.position.x += (Math.random() - 0.5) * shakeAmt;
    camera.position.y += (Math.random() - 0.5) * shakeAmt;
    camera.position.z += (Math.random() - 0.5) * shakeAmt;
    shakeAmt *= Math.pow(0.0001, dt); // fast decay
    if (shakeAmt < 0.01) shakeAmt = 0;
  }
  camera.lookAt(player.pos.x, player.pos.y + 0.8, player.pos.z);
}

function updatePlayer(dt) {
  if (!player.alive || !player.mesh) return;

  // Movement input
  const speed = (player.speedBoost ? PLAYER_SPEED * 1.6 : PLAYER_SPEED);
  const moveVec = new THREE.Vector3();
  const camFwd = new THREE.Vector3(Math.sin(cameraAngle), 0, Math.cos(cameraAngle));
  const camRight = new THREE.Vector3(Math.cos(cameraAngle), 0, -Math.sin(cameraAngle));

  if (keys.w || keys.ArrowUp) moveVec.add(camFwd);
  if (keys.s || keys.ArrowDown) moveVec.sub(camFwd);
  if (keys.a || keys.ArrowLeft) moveVec.sub(camRight);
  if (keys.d || keys.ArrowRight) moveVec.add(camRight);

  // Joystick
  if (joystick.active) {
    const jx = joystick.dx / 60;
    const jz = joystick.dy / 60;
    moveVec.add(camRight.clone().multiplyScalar(jx));
    moveVec.add(camFwd.clone().multiplyScalar(-jz));
  }

  if (moveVec.length() > 0) {
    moveVec.normalize().multiplyScalar(speed * dt);
    const newX = player.pos.x + moveVec.x;
    const newZ = player.pos.z + moveVec.z;
    player.pos.x = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, newX));
    player.pos.z = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, newZ));

    // Face movement direction
    if (moveVec.lengthSq() > 0.0001) {
      const targetAngle = Math.atan2(moveVec.x, moveVec.z);
      let currentAngle = player.mesh.rotation.y;
      let diff = targetAngle - currentAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      player.mesh.rotation.y += diff * 0.2;
    }

    // Walk animation
    player.walkCycle += dt * 8;
    player.mesh.children.forEach(child => {
      if (child.userData.isLeg) {
        const swing = Math.sin(player.walkCycle + child.userData.legIdx * Math.PI) * 0.3;
        child.rotation.x = swing;
      }
    });
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0;
  lantern.position.set(player.pos.x, 2.5, player.pos.z);

  // Timers
  if (player.fireTimer > 0) player.fireTimer -= dt;
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
  if (player.specialCooldown > 0) {
    player.specialCooldown -= dt;
    if (player.specialCooldown < 0) player.specialCooldown = 0;
  }
  if (player.rapidTimer > 0) {
    player.rapidTimer -= dt;
    if (player.rapidTimer <= 0) { player.rapidFire = false; player.speedBoost = false; }
  }

  // Auto-aim shooting
  const fireInterval = player.rapidFire ? 0.1 : 1 / FIRE_RATE;
  if ((player.shooting || mobileFireDown) && player.fireTimer <= 0) {
    const nearest = findNearestEnemy();
    if (nearest) {
      const dir = nearest.mesh.position.clone().sub(player.pos).normalize();
      const origin = player.pos.clone().add(new THREE.Vector3(0, 0.8, 0));
      createBullet(origin, dir);
      playShoot();
      player.fireTimer = fireInterval;
      // Hand glow
      if (player.rightHand) {
        player.rightHand.material.opacity = 0.8;
        setTimeout(() => { if (player.rightHand) player.rightHand.material.opacity = 0; }, 100);
      }
    }
  }

  // Special ability bar
  const barEl = document.getElementById('special-bar');
  const pct = player.specialCooldown > 0 ? (1 - player.specialCooldown / SPECIAL_COOLDOWN) * 100 : 100;
  barEl.style.width = pct + '%';

  // Aura pulse - always gently breathing
  if (player.auraMesh) {
    const t = Date.now() * 0.003;
    player.auraMesh.scale.setScalar(1 + Math.sin(t) * 0.1);
    player.auraMesh.material.opacity = 0.12 + Math.sin(t) * 0.04;
    if (player.auraOuter) {
      player.auraOuter.scale.setScalar(1 + Math.sin(t * 0.7 + 1) * 0.14);
      player.auraOuter.material.opacity = 0.06 + Math.sin(t * 0.7) * 0.025;
    }
  }
}

function findNearestEnemy() {
  let nearest = null, minDist = Infinity;
  enemies.forEach(e => {
    if (!e.alive) return;
    const d = e.mesh.position.distanceTo(player.pos);
    if (d < minDist) { minDist = d; nearest = e; }
  });
  return nearest;
}

function updateEnemies(dt) {
  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    const ePos = enemy.mesh.position;
    const pPos = player.pos;
    const dist = ePos.distanceTo(pPos);

    // Move toward player
    if (dist > 0.8) {
      const dir = pPos.clone().sub(ePos).normalize();
      ePos.x += dir.x * enemy.speed * dt;
      ePos.z += dir.z * enemy.speed * dt;
      ePos.x = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, ePos.x));
      ePos.z = Math.max(-WORLD_SIZE + 0.5, Math.min(WORLD_SIZE - 0.5, ePos.z));
      // Face player
      enemy.mesh.rotation.y = Math.atan2(pPos.x - ePos.x, pPos.z - ePos.z);
    }

    // Walk bob
    enemy.walkPhase += dt * (enemy.type === 'demodog' ? 10 : 6);
    const bobY = Math.sin(enemy.walkPhase) * 0.07;
    ePos.y = bobY;

    // Mouth animation
    const mouthOpen = dist < 8;
    if (mouthOpen) {
      enemy.mesh.userData.mouthOpen = Math.min(1, enemy.mesh.userData.mouthOpen + dt * 3);
    } else {
      enemy.mesh.userData.mouthOpen = Math.max(0, enemy.mesh.userData.mouthOpen - dt * 3);
    }
    const mo = enemy.mesh.userData.mouthOpen;
    if (enemy.mesh.userData.throatMesh) {
      const th = enemy.mesh.userData.throatMesh;
      const pulse = 1 + Math.sin(enemy.walkPhase * 2) * 0.25;
      th.scale.setScalar(0.6 + mo * pulse);
      th.visible = mo > 0.05;
    }
    if (enemy.mesh.userData.petalMeshes) {
      enemy.mesh.userData.petalMeshes.forEach((petal, i) => {
        const baseA = petal.userData.baseAngle;
        petal.rotation.set(mo * -1.8, mo * 0.3 * (i % 2 === 0 ? 1 : -1), baseA * 0.5 * mo);
      });
    }

    // Attack player
    if (dist < 1.2) {
      enemy.attackTimer += dt;
      if (enemy.attackTimer > 1.0) {
        playerTakeDamage();
        enemy.attackTimer = 0;
      }
    } else {
      enemy.attackTimer = 0;
    }

    // Update health bar
    if (enemy.hbMesh) {
      const pct = enemy.hp / enemy.maxHp;
      enemy.hbMesh.scale.x = pct;
      enemy.hbMesh.position.x = -(1 - pct) * 0.4;
      enemy.hbMesh.lookAt(camera.position);
    }
  });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.alive) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
    const move = b.dir.clone().multiplyScalar(BULLET_SPEED * dt);
    b.mesh.position.add(move);
    b.dist += move.length();
    if (b.dist > BULLET_RANGE) { b.alive = false; continue; }

    // Hit enemies
    let hit = false;
    for (const enemy of enemies) {
      if (!enemy.alive) continue;
      if (b.mesh.position.distanceTo(enemy.mesh.position) < (enemy.isBoss ? 1.2 : 0.7)) {
        const dmg = player.rapidFire ? 30 : 20;
        enemy.hp -= dmg;
        playHitEnemy();
        spawnParticles(b.mesh.position.clone(), 10, 0xffcc44);
        // Brief white emissive flash on the body
        const mats = enemy.mesh.userData.skinMats;
        if (mats && !enemy._flashing) {
          enemy._flashing = true;
          mats.forEach(m => { m.userData._e = m.emissive.getHex(); m.userData._ei = m.emissiveIntensity; m.emissive.setHex(0xffffff); m.emissiveIntensity = 1.4; });
          setTimeout(() => {
            mats.forEach(m => { m.emissive.setHex(m.userData._e ?? 0x7a3a2a); m.emissiveIntensity = m.userData._ei ?? 0.8; });
            enemy._flashing = false;
          }, 70);
        }
        if (enemy.hp <= 0) killEnemy(enemy);
        b.alive = false;
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = 1 - p.age / p.life;
  }
}

function updatePowerUps(dt) {
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (!pu.alive) { scene.remove(pu.mesh); powerUps.splice(i, 1); continue; }
    pu.mesh.rotation.y += dt * 2.0;
    pu.mesh.position.y = 0.6 + Math.sin(Date.now() * 0.0025 + i) * 0.2;
    const halo = pu.mesh.children.find(c => c.userData.isHalo);
    if (halo) halo.scale.setScalar(1 + Math.sin(Date.now() * 0.005 + i) * 0.18);
    if (pu.mesh.position.distanceTo(player.pos) < 1.2) {
      playPowerUp();
      if (pu.type === 'eggo') {
        player.hp = Math.min(player.maxHp, player.hp + 3);
      } else {
        player.rapidFire = true;
        player.speedBoost = true;
        player.rapidTimer = 5;
      }
      updateHUD();
      pu.alive = false;
    }
  }
}

function updateShockwaves(dt) {
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const sw = shockwaves[i];
    if (!sw.alive) { scene.remove(sw.mesh); shockwaves.splice(i, 1); continue; }
    sw.scale += dt * 20;
    sw.mesh.scale.setScalar(sw.scale);
    sw.mat.opacity = Math.max(0, 0.8 - sw.scale * 0.065);
    if (sw.scale > 12) { sw.alive = false; }
  }
}

function updateSpores(dt) {
  const t = Date.now() * 0.001;
  spores.forEach(s => {
    s.position.y = s.userData.baseY + Math.sin(t * s.userData.freq + s.userData.phase) * 0.4;
    s.position.x += s.userData.driftX;
    s.position.z += s.userData.driftZ;
    if (Math.abs(s.position.x) > WORLD_SIZE) s.userData.driftX *= -1;
    if (Math.abs(s.position.z) > WORLD_SIZE) s.userData.driftZ *= -1;
  });
  // Embers drift upward, reset at the top
  embers.forEach(e => {
    e.position.y += e.userData.rise * dt;
    e.position.x += Math.sin(t * 0.5 + e.userData.sway) * 0.004;
    if (e.position.y > 9) {
      e.position.y = 0;
      e.position.x = (Math.random() - 0.5) * WORLD_SIZE * 2;
      e.position.z = (Math.random() - 0.5) * WORLD_SIZE * 2;
    }
  });
  // Boundary glow pulse
  const bp = 0.7 + Math.sin(t * 3) * 0.25;
  boundaryGlows.forEach(g => { g.material.opacity = bp; });
}

function triggerSpecial() {
  if (player.specialCooldown > 0 || !player.alive) return;
  player.specialCooldown = SPECIAL_COOLDOWN;
  playSpecialAbility();
  addShake(0.45);
  createShockwave(player.pos.clone());

  // Nosebleed effect
  player.nosebleed.forEach(nb => { nb.visible = true; });
  setTimeout(() => { player.nosebleed.forEach(nb => { nb.visible = false; }); }, 800);

  // AoE damage
  enemies.forEach(enemy => {
    if (!enemy.alive) return;
    const dist = enemy.mesh.position.distanceTo(player.pos);
    if (dist < SPECIAL_RADIUS) {
      const pushDir = enemy.mesh.position.clone().sub(player.pos).normalize();
      enemy.mesh.position.addScaledVector(pushDir, (SPECIAL_RADIUS - dist) * 0.5);
      enemy.hp -= SPECIAL_DAMAGE;
      if (enemy.hp <= 0) killEnemy(enemy, true);
    }
  });
}

const gameTimers = { announce: 0, combo: 0 };

function updateGameTimers(dt) {
  if (gameState.announceTimer > 0) {
    gameState.announceTimer -= dt;
    if (gameState.announceTimer <= 0) {
      document.getElementById('wave-announce').style.opacity = '0';
    }
  }
  if (gameState.comboTimer > 0) {
    gameState.comboTimer -= dt;
    if (gameState.comboTimer <= 0) {
      gameState.multiplier = 1;
      document.getElementById('combo-display').style.opacity = '0';
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState.running) {
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    updatePowerUps(dt);
    updateShockwaves(dt);
    updateSpores(dt);
    updateCamera(dt);
    updateGameTimers(dt);
    checkWaveComplete();
  } else {
    updateCamera(dt);
  }

  composer.render();
}

// ============================================================
// 10. INPUT HANDLING
// ============================================================
const keys = {};
let mobileFireDown = false;

// Prevent pinch-zoom, double-tap-zoom, pull-to-refresh
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive: false }));
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTouchEnd < 300) e.preventDefault();
  _lastTouchEnd = now;
}, { passive: false });

const joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, id: null };
let cameraTouchId = null, cameraTouchLastX = 0, cameraTouchLastY = 0;
let mouseDown = false, lastMouseX = 0, lastMouseY = 0;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); if (gameState.running) triggerSpecial(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.addEventListener('mousedown', e => {
  if (!gameState.running) return;
  initAudio();
  mouseDown = true;
  lastMouseX = e.clientX; lastMouseY = e.clientY;
  if (e.clientX > window.innerWidth * 0.5) {
    player.shooting = true;
  }
});
document.addEventListener('mouseup', () => {
  mouseDown = false;
  player.shooting = false;
});
document.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  if (e.clientX > window.innerWidth * 0.5) {
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    cameraAngle -= dx * 0.005;
    cameraAngleV = Math.max(0.2, Math.min(1.2, cameraAngleV + dy * 0.004));
  }
  lastMouseX = e.clientX; lastMouseY = e.clientY;
});

// Mobile touch controls
const joystickZone = document.getElementById('joystick-zone');
joystickZone.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  const t = e.changedTouches[0];
  joystick.active = true; joystick.id = t.identifier;
  joystick.startX = t.clientX; joystick.startY = t.clientY;
  joystick.dx = 0; joystick.dy = 0;
}, { passive: false });
joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      joystick.dx = Math.max(-60, Math.min(60, t.clientX - joystick.startX));
      joystick.dy = Math.max(-60, Math.min(60, t.clientY - joystick.startY));
      const k = document.getElementById('joystick-knob');
      k.style.transform = `translate(calc(-50% + ${joystick.dx}px), calc(-50% + ${joystick.dy}px))`;
    }
  }
}, { passive: false });
joystickZone.addEventListener('touchend', e => {
  joystick.active = false; joystick.dx = 0; joystick.dy = 0;
  const k = document.getElementById('joystick-knob');
  k.style.transform = 'translate(-50%, -50%)';
});

const fireBtn = document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); mobileFireDown = true; }, { passive: false });
fireBtn.addEventListener('touchend', () => { mobileFireDown = false; });

const powerBtn = document.getElementById('power-btn');
powerBtn.addEventListener('touchstart', e => { e.preventDefault(); if (gameState.running) triggerSpecial(); }, { passive: false });

// Camera rotation via right-side touch
canvas.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (t.clientX > window.innerWidth * 0.5 && !cameraTouchId) {
      cameraTouchId = t.identifier;
      cameraTouchLastX = t.clientX;
      cameraTouchLastY = t.clientY;
    }
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === cameraTouchId) {
      cameraAngle -= (t.clientX - cameraTouchLastX) * 0.006;
      cameraAngleV = Math.max(0.2, Math.min(1.2, cameraAngleV + (t.clientY - cameraTouchLastY) * 0.005));
      cameraTouchLastX = t.clientX;
      cameraTouchLastY = t.clientY;
    }
  }
}, { passive: true });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === cameraTouchId) cameraTouchId = null;
  }
});

// ============================================================
// 11. UI HELPERS
// ============================================================
function updateHUD() {
  document.getElementById('score').textContent = `SCORE: ${player.score}`;
  document.getElementById('wave-info').textContent = `WAVE ${player.wave}`;
  document.getElementById('lives').textContent = `❤️ ${player.hp}`;
}

function showCombo(text) {
  const el = document.getElementById('combo-display');
  el.textContent = text;
  el.style.opacity = '1';
}

// Build start screen lights
function buildStartLights() {
  const row = document.getElementById('lights-row');
  const colors = ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#ff00ff','#ffffff','#00ffff'];
  for (let i = 0; i < 24; i++) {
    const b = document.createElement('div');
    b.className = 'bulb';
    b.style.background = colors[i % colors.length];
    b.style.color = colors[i % colors.length];
    b.style.animationDelay = `${(i * 0.18) % 1.5}s`;
    row.appendChild(b);
  }
}

// Button handlers
document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  gameState.started = true;
  gameState.running = true;
  startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('death-screen').style.display = 'none';
  startGame();
});

// Init
buildStartLights();
buildEnvironment();

// Initial camera position
camera.position.set(0, 17, -13);
camera.lookAt(0, 0, 0);

animate();
