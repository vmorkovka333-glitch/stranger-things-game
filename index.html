<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Stranger Things - Upside Down Survival</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #140a28;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #canvas { display: block; width: 100%; height: 100%; }
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #score {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left));
    font-family: 'Creepster', cursive; font-size: clamp(20px, 4.5vmin, 32px);
    color: #ff5555;
    text-shadow: 0 0 8px #ff0000, 0 0 20px #ff000088;
  }
  #wave-info {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: clamp(18px, 4.2vmin, 30px); color: #d877ff;
    text-shadow: 0 0 10px #aa00ff;
    text-align: center;
  }
  #lives {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); right: calc(14px + env(safe-area-inset-right));
    font-family: 'Creepster', cursive; font-size: clamp(18px, 4.2vmin, 30px); color: #ff6688;
    text-shadow: 0 0 8px #ff0055;
  }
  #special-bar-container {
    position: absolute; bottom: calc(18px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: min(200px, 44vw); height: 16px;
    border: 2px solid #aa00cc;
    border-radius: 9px; overflow: hidden;
    box-shadow: 0 0 10px #8800cc88;
  }
  #special-bar {
    height: 100%; width: 100%;
    background: linear-gradient(to right, #4400aa, #aa00ff);
    transition: width 0.1s;
  }
  #special-label {
    position: absolute; bottom: calc(38px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    font-family: 'VT323', monospace; font-size: clamp(13px, 3vmin, 18px); color: #cc77ff;
    text-align: center; white-space: nowrap;
  }
  #wave-announce {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; opacity: 0;
    transition: opacity 0.4s;
  }
  #wave-announce .title {
    font-family: 'Creepster', cursive; font-size: 64px; color: #cc00ff;
    text-shadow: 0 0 20px #ff00ff, 0 0 40px #aa00ff;
  }
  #wave-announce .subtitle {
    font-family: 'VT323', monospace; font-size: 32px; color: #ff88ff;
    text-shadow: 0 0 10px #ff44ff;
    margin-top: 8px;
  }
  #combo-display {
    position: absolute; top: 55%; left: 50%; transform: translateX(-50%);
    font-family: 'Creepster', cursive; font-size: 48px; color: #ffcc00;
    text-shadow: 0 0 16px #ffaa00, 0 0 32px #ff8800;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #start-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15,7,32,0.94); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    padding: 24px;
  }
  #lights-row {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-around; padding: 10px;
    pointer-events: none;
  }
  .bulb {
    width: 16px; height: 22px; border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
    animation: blink 1s infinite alternate;
  }
  @keyframes blink { 0%{opacity:1} 100%{opacity:0.2} }
  #start-title {
    font-family: 'Creepster', cursive; font-size: clamp(40px, 11vmin, 80px); color: #ff3333;
    text-shadow: 0 0 20px #ff0000, 0 0 50px #cc0000;
    letter-spacing: 4px; text-align: center;
    animation: titlePulse 2s infinite alternate;
    margin-bottom: 10px;
  }
  @keyframes titlePulse {
    0% { text-shadow: 0 0 20px #ff0000, 0 0 50px #cc0000; }
    100% { text-shadow: 0 0 30px #ff4444, 0 0 80px #ff0000, 0 0 120px #880000; }
  }
  #start-subtitle {
    font-family: 'VT323', monospace; font-size: clamp(20px, 5vmin, 32px); color: #d877ff;
    text-shadow: 0 0 12px #aa00ff; margin-bottom: 48px; text-align: center;
  }
  #start-btn, #restart-btn {
    font-family: 'Creepster', cursive; font-size: clamp(22px, 5vmin, 30px);
    background: rgba(60,0,90,0.5); border: 3px solid #cc00ff;
    color: #ff99ff; min-height: 64px; min-width: 240px; padding: 14px 48px; cursor: pointer;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 3px;
    box-shadow: 0 0 24px #aa00ffaa; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #start-btn:hover, #restart-btn:hover, #start-btn:active, #restart-btn:active {
    background: #6a00aa; box-shadow: 0 0 44px #cc00ff;
    color: #ffffff; transform: scale(1.04);
  }
  #death-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15,7,32,0.92); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; padding: 24px;
  }
  #death-title {
    font-family: 'Creepster', cursive; font-size: clamp(56px, 15vmin, 110px); color: #ff0000;
    text-shadow: 0 0 30px #ff0000, 0 0 60px #880000;
    animation: deathPulse 1.5s infinite alternate;
  }
  @keyframes deathPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.04); }
  }
  #death-stats {
    font-family: 'VT323', monospace; font-size: clamp(18px, 4.5vmin, 28px); color: #d099ff;
    text-align: center; margin: 28px 0 44px;
    line-height: 1.8;
  }
  /* Mobile controls */
  #mobile-controls { display: none; }
  @media (pointer: coarse) {
    #mobile-controls { display: block; }
  }
  #joystick-zone {
    position: absolute; bottom: calc(70px + env(safe-area-inset-bottom));
    left: calc(22px + env(safe-area-inset-left)); width: 132px; height: 132px;
    border-radius: 50%; border: 3px solid rgba(170,120,255,0.55);
    background: rgba(120,70,200,0.18); pointer-events: all;
    touch-action: none; z-index: 20;
  }
  #joystick-knob {
    position: absolute; width: 58px; height: 58px;
    border-radius: 50%; background: rgba(200,120,255,0.65);
    border: 3px solid rgba(220,160,255,0.95);
    box-shadow: 0 0 16px rgba(200,120,255,0.7);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  #fire-btn {
    position: absolute; bottom: calc(70px + env(safe-area-inset-bottom));
    right: calc(22px + env(safe-area-inset-right)); width: 104px; height: 104px;
    border-radius: 50%; background: rgba(210,30,40,0.62);
    border: 4px solid #ff5555; color: #fff;
    font-family: 'Creepster', cursive; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all; touch-action: none; cursor: pointer;
    box-shadow: 0 0 22px #ff0000aa;
    user-select: none; z-index: 20; transition: transform 0.08s, background 0.08s;
  }
  #fire-btn:active {
    background: rgba(255,70,80,0.85); transform: scale(0.92);
  }
  #power-btn {
    position: absolute; bottom: calc(190px + env(safe-area-inset-bottom));
    right: calc(38px + env(safe-area-inset-right)); width: 80px; height: 80px;
    border-radius: 50%; background: rgba(120,20,210,0.62);
    border: 4px solid #cc66ff; color: #fff;
    font-family: 'VT323', monospace; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all; touch-action: none; cursor: pointer;
    box-shadow: 0 0 22px #aa00ffaa; flex-direction: column;
    user-select: none; text-align: center; z-index: 20; transition: transform 0.08s, background 0.08s;
  }
  #power-btn:active {
    background: rgba(170,60,255,0.85); transform: scale(0.92);
  }
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(120,240,255,0.9);
    box-shadow: 0 0 6px rgba(100,224,255,0.9);
  }
  #crosshair::before { width: 3px; height: 22px; left: 9.5px; top: 0; }
  #crosshair::after { width: 22px; height: 3px; left: 0; top: 9.5px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score">SCORE: 0</div>
  <div id="wave-info">WAVE 1</div>
  <div id="lives">❤️ 20</div>
  <div id="special-label">PSYCHIC BLAST [SPACE]</div>
  <div id="special-bar-container"><div id="special-bar"></div></div>
  <div id="wave-announce">
    <div class="title" id="wave-title">WAVE 1</div>
    <div class="subtitle" id="wave-subtitle">THEY'RE COMING</div>
  </div>
  <div id="combo-display"></div>
  <div id="crosshair"></div>
</div>

<div id="start-screen">
  <div id="lights-row"></div>
  <div id="start-title">STRANGER THINGS</div>
  <div id="start-subtitle">UPSIDE DOWN SURVIVAL</div>
  <button id="start-btn">ENTER THE GATE</button>
</div>

<div id="death-screen">
  <div id="death-title">YOU DIED</div>
  <div id="death-stats" id="death-stats"></div>
  <button id="restart-btn">TRY AGAIN</button>
</div>

<div id="mobile-controls">
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="fire-btn">FIRE</div>
  <div id="power-btn">⚡<br>POWER</div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================
// 0. CHARACTER ART ASSETS (drop files in the repo to use real art)
//   - <name>.glb  -> exact 3D model (preferred)
//   - <name>.png  -> photo cutout billboard (transparent PNG recommended)
//   If neither file exists, the built-in stylized model is used.
// ============================================================
const texLoader = new THREE.TextureLoader();
let _gltfLoader = null;
function getGLTFLoader() {
  if (!_gltfLoader) {
    _gltfLoader = import('three/addons/loaders/GLTFLoader.js').then(m => new m.GLTFLoader());
  }
  return _gltfLoader;
}
// Swap a procedural character group's visuals for a real model/photo if present.
function applyCharacterArt(group, { name, height = 2.0, yOffset = 0 }) {
  const hideProc = () => group.traverse(o => { if (o.isMesh) o.visible = false; });
  // 2) Photo cutout billboard (always faces the camera)
  const tryPhoto = () => texLoader.load(
    `${name}.png`,
    tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      hideProc();
      const aspect = (tex.image && tex.image.width / tex.image.height) || 0.6;
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, toneMapped: false }));
      sprite.scale.set(height * aspect, height, 1);
      sprite.position.y = yOffset + height / 2;
      group.add(sprite);
    },
    undefined,
    () => {/* 3) no asset files -> keep the stylized built-in model */}
  );
  // 1) Prefer a real 3D model; fall back to photo, then to built-in
  getGLTFLoader().then(loader => loader.load(
    `${name}.glb`,
    gltf => {
      hideProc();
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3(); box.getSize(size);
      const sc = height / (size.y || 1);
      model.scale.setScalar(sc);
      model.position.y = yOffset - box.min.y * sc;
      model.traverse(o => { if (o.isMesh) o.castShadow = true; });
      group.add(model);
    },
    undefined,
    tryPhoto
  )).catch(tryPhoto);
}

// ============================================================
// 1. CONSTANTS
// ============================================================
const WORLD_SIZE = 40;
const GROUND_SEGS = 40;
const WALL_COUNT = 35;
const SPORE_COUNT = 60;
const FIRE_RATE = 5; // shots per second
const BULLET_SPEED = 22;
const BULLET_RANGE = 44;
const PLAYER_SPEED = 6;
const SPECIAL_COOLDOWN = 8;
const SPECIAL_RADIUS = 12;
const SPECIAL_DAMAGE = 60;
const MAX_PARTICLES = matchMedia('(pointer: coarse)').matches ? 250 : 320;
const ENEMY_SPAWN_MIN = 14;
const ENEMY_SPAWN_MAX = 34;
const BOSS_WAVE_INTERVAL = 5;
const COMBO_WINDOW = 3;

// ============================================================
// 2. AUDIO ENGINE
// ============================================================
let audioCtx = null;
let ambientDrone = null;
let ambientGainNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Ambient drone
  ambientDrone = audioCtx.createOscillator();
  ambientDrone.type = 'sawtooth';
  ambientDrone.frequency.setValueAtTime(55, audioCtx.currentTime);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(200, audioCtx.currentTime);
  const delay = audioCtx.createDelay(2.0);
  delay.delayTime.setValueAtTime(0.6, audioCtx.currentTime);
  const feedback = audioCtx.createGain();
  feedback.gain.setValueAtTime(0.35, audioCtx.currentTime);
  ambientGainNode = audioCtx.createGain();
  ambientGainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
  ambientDrone.connect(filter);
  filter.connect(delay);
  delay.connect(feedback);
  feedback.connect(delay);
  filter.connect(ambientGainNode);
  delay.connect(ambientGainNode);
  ambientGainNode.connect(audioCtx.destination);
  ambientDrone.start();
}

function playShoot() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.setValueAtTime(1200, t);
  f.frequency.exponentialRampToValueAtTime(200, t + 0.1);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t + 0.13);
}

function playHitEnemy() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.16);
}

function playEnemyDeath() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800 - i * 200, t + i * 0.04);
    osc.frequency.exponentialRampToValueAtTime(50, t + 0.3 + i * 0.04);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.18, t + i * 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32 + i * 0.04);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i * 0.04); osc.stop(t + 0.35 + i * 0.04);
  }
}

function playPlayerHurt() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.3);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.36);
}

function playWaveStart() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'square'; osc.frequency.setValueAtTime(110, t);
  osc.frequency.exponentialRampToValueAtTime(880, t + 0.8);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, t); g.gain.linearRampToValueAtTime(0.3, t + 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 1.1);
}

function playPowerUp() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, t + i * 0.08);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.2, t + i * 0.08); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + i * 0.08);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i * 0.08); osc.stop(t + 0.32 + i * 0.08);
  });
}

function playSpecialAbility() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.setValueAtTime(40, t);
  osc.frequency.exponentialRampToValueAtTime(20, t + 0.5);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1800, t);
  osc2.frequency.exponentialRampToValueAtTime(3600, t + 0.3);
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(g); g.connect(audioCtx.destination);
  osc2.connect(g2); g2.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.65);
  osc2.start(t); osc2.stop(t + 0.45);
}

// ============================================================
// 3. SCENE SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
const isMobile = matchMedia('(pointer: coarse)').matches;
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.7;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x140a28);
scene.fog = new THREE.FogExp2(0x241640, 0.007);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 20, -11);
camera.lookAt(0, 0, 0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.7, 0.5, 0.7
);
composer.addPass(bloomPass);

// Lights - bright, stylized, high-contrast (NOT realistic-dark)
const ambientLight = new THREE.AmbientLight(0x9a86c0, 1.4);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x9a7aff, 0x3a2a44, 1.0);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffd0c0, 1.6);
dirLight.position.set(8, 24, -6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);
// Cyan rim/back light - makes creatures pop against the fog
const rimLight = new THREE.DirectionalLight(0x66e0ff, 1.3);
rimLight.position.set(-6, 9, 14);
scene.add(rimLight);

// Player lantern (follows player) - big radius so the near area is well lit
const lantern = new THREE.PointLight(0xffe0b0, 3.0, 30, 1.6);
lantern.castShadow = true;
lantern.shadow.mapSize.width = 512;
lantern.shadow.mapSize.height = 512;
scene.add(lantern);

// Cap simultaneous dynamic point lights (lantern + per-enemy glows)
const MAX_ENEMY_LIGHTS = 11;
let activeEnemyLights = 0;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// 4. ENVIRONMENT
// ============================================================
function buildEnvironment() {
  // Ground plane - Upside Down terrain
  const gGeo = new THREE.PlaneGeometry(WORLD_SIZE * 2, WORLD_SIZE * 2, GROUND_SEGS, GROUND_SEGS);
  const pos = gGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const disp = Math.sin(x * 0.4) * Math.cos(z * 0.3) * 0.5
                + Math.sin(x * 0.9 + 1.2) * 0.3
                + Math.cos(z * 0.7 + 0.8) * 0.25
                + (Math.random() - 0.5) * 0.15;
    pos.setY(i, disp);
  }
  gGeo.computeVertexNormals();
  const gMat = new THREE.MeshStandardMaterial({
    color: 0x2e2248, emissive: 0x1a1030, emissiveIntensity: 1.0, roughness: 1, metalness: 0
  });
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Emissive vein grid overlay for floor depth cues
  const grid = new THREE.GridHelper(WORLD_SIZE * 2, 40, 0x6a4aff, 0x6a4aff);
  grid.material.transparent = true;
  grid.material.opacity = 0.5;
  grid.material.toneMapped = false;
  grid.position.y = 0.05;
  scene.add(grid);

  // Large faint radial glow under the play area
  const glowTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, 'rgba(140,90,220,0.55)');
    g.addColorStop(0.5, 'rgba(90,50,160,0.18)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  })();
  const glowDisc = new THREE.Mesh(
    new THREE.PlaneGeometry(WORLD_SIZE * 1.6, WORLD_SIZE * 1.6),
    new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  glowDisc.rotation.x = -Math.PI / 2;
  glowDisc.position.y = 0.06;
  scene.add(glowDisc);

  // Boundary glow lines
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xff3355, linewidth: 3, toneMapped: false });
  const half = WORLD_SIZE;
  [[[-half,-half],[half,-half]],[[half,-half],[half,half]],[[half,half],[-half,half]],[[-half,half],[-half,-half]]].forEach(([a,b]) => {
    const pts = [new THREE.Vector3(a[0], 0.1, a[1]), new THREE.Vector3(b[0], 0.1, b[1])];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, edgeMat);
    scene.add(line);
    // Glow mesh
    const gGeoB = new THREE.BoxGeometry(Math.abs(b[0]-a[0]) + 0.1, 0.42, 0.42);
    const gMatB = new THREE.MeshBasicMaterial({ color: 0xff3355, transparent: true, opacity: 0.9, toneMapped: false });
    const gMesh = new THREE.Mesh(gGeoB, gMatB);
    gMesh.position.set((a[0]+b[0])/2, 0.2, (a[1]+b[1])/2);
    if (Math.abs(a[1]-b[1]) > 0.1) {
      gGeoB.scale(0.42 / (Math.abs(b[0]-a[0])+0.1), 1, (Math.abs(b[1]-a[1])+0.1) / 0.42);
    }
    gMesh.userData.boundaryGlow = true;
    boundaryGlows.push(gMesh);
    scene.add(gMesh);
  });

  // Walls
  for (let i = 0; i < WALL_COUNT; i++) {
    const w = 1 + Math.random() * 2.5;
    const d = 1 + Math.random() * 2;
    const h = 1.5 + Math.random() * 3;
    const wGeo = new THREE.BoxGeometry(w, h, d);
    const wMat = new THREE.MeshStandardMaterial({ color: 0x4a3a66, emissive: 0x241636, emissiveIntensity: 0.9, roughness: 0.9, metalness: 0 });
    const wall = new THREE.Mesh(wGeo, wMat);
    wall.position.set(
      (Math.random() - 0.5) * (WORLD_SIZE * 1.6),
      h / 2,
      (Math.random() - 0.5) * (WORLD_SIZE * 1.6)
    );
    wall.rotation.y = Math.random() * Math.PI;
    wall.castShadow = true;
    wall.receiveShadow = true;
    wall.userData.isWall = true;
    scene.add(wall);
    walls.push(wall);

    // Glowing vine lines wrapping the vertical edges
    const vineMat = new THREE.MeshBasicMaterial({ color: 0xb84dff, toneMapped: false });
    [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx, sz]) => {
      const vine = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, h, 5), vineMat);
      vine.position.set(sx * w / 2, 0, sz * d / 2);
      wall.add(vine);
    });
    // Glowing torus vine ring around the wall
    const torus = new THREE.Mesh(
      new THREE.TorusGeometry(Math.max(w, d) * 0.62, 0.05, 6, 16),
      new THREE.MeshBasicMaterial({ color: 0xb84dff, toneMapped: false })
    );
    torus.rotation.x = Math.PI / 2;
    torus.position.y = (Math.random() - 0.3) * h * 0.5;
    wall.add(torus);
  }

  // Spores - bigger, brighter, double as ambient light cues
  for (let i = 0; i < SPORE_COUNT; i++) {
    const sGeo = new THREE.SphereGeometry(0.16 + Math.random() * 0.22, 6, 6);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xcc99ff, transparent: true, opacity: 0.9, toneMapped: false });
    const spore = new THREE.Mesh(sGeo, sMat);
    spore.position.set(
      (Math.random() - 0.5) * WORLD_SIZE * 1.8,
      0.8 + Math.random() * 4,
      (Math.random() - 0.5) * WORLD_SIZE * 1.8
    );
    spore.userData.baseY = spore.position.y;
    spore.userData.phase = Math.random() * Math.PI * 2;
    spore.userData.freq = 0.3 + Math.random() * 0.5;
    spore.userData.driftX = (Math.random() - 0.5) * 0.008;
    spore.userData.driftZ = (Math.random() - 0.5) * 0.008;
    scene.add(spore);
    spores.push(spore);
  }

  // Distant atmospheric embers drifting up (additive, sparse)
  for (let i = 0; i < 50; i++) {
    const eGeo = new THREE.SphereGeometry(0.04 + Math.random() * 0.05, 4, 4);
    const eMat = new THREE.MeshBasicMaterial({ color: 0xff7a55, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false });
    const ember = new THREE.Mesh(eGeo, eMat);
    ember.position.set(
      (Math.random() - 0.5) * WORLD_SIZE * 2,
      Math.random() * 8,
      (Math.random() - 0.5) * WORLD_SIZE * 2
    );
    ember.userData.rise = 0.3 + Math.random() * 0.5;
    ember.userData.sway = Math.random() * Math.PI * 2;
    scene.add(ember);
    embers.push(ember);
  }
}

// ============================================================
// 5. PLAYER (ELEVEN)
// ============================================================
function buildElevenModel() {
  const group = new THREE.Group();

  // Eleven's iconic colorful patterned shirt (procedural texture)
  const shirtTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0b0b14'; ctx.fillRect(0, 0, 128, 128);
    const palette = ['#e23b3b', '#2f7ad8', '#f2c43b', '#3bbf63', '#8e44c8', '#e85aa0', '#28c0c0', '#f5f5f5'];
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = palette[(Math.random() * palette.length) | 0];
      const w = 12 + Math.random() * 26, h = 12 + Math.random() * 26;
      ctx.save();
      ctx.translate(Math.random() * 128, Math.random() * 128);
      ctx.rotate(Math.random() * Math.PI);
      ctx.fillRect(-w / 2, -h / 2, w, h);
      ctx.restore();
    }
    for (let i = 0; i < 4; i++) {
      const cx = Math.random() * 128, cy = Math.random() * 128;
      ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let a = 0; a < 7; a += 0.2) {
        const r = a * 1.8;
        const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  })();
  const shirtMat = new THREE.MeshStandardMaterial({
    map: shirtTex, emissiveMap: shirtTex, emissive: 0xffffff,
    emissiveIntensity: 0.45, roughness: 0.75
  });

  // Body - patterned shirt
  const bodyGeo = new THREE.CylinderGeometry(0.23, 0.3, 0.72, 12);
  const body = new THREE.Mesh(bodyGeo, shirtMat);
  body.position.y = 0.6;
  group.add(body);

  // Neck
  const skinTone = 0xe8b894;
  const headMat = new THREE.MeshStandardMaterial({ color: skinTone, emissive: 0x6a4a32, emissiveIntensity: 0.55, roughness: 0.55 });
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.09, 0.12, 8), headMat);
  neck.position.y = 1.0;
  group.add(neck);

  // Head - softly egg-shaped
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.215, 16, 14), headMat);
  head.position.y = 1.18;
  head.scale.set(0.94, 1.08, 1.0);
  group.add(head);
  // Jaw / chin taper
  const jaw = new THREE.Mesh(new THREE.SphereGeometry(0.155, 12, 10), headMat);
  jaw.position.set(0, 1.07, 0.02);
  jaw.scale.set(0.92, 0.85, 0.95);
  group.add(jaw);
  // Ears
  [-1, 1].forEach(s => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), headMat);
    ear.position.set(s * 0.205, 1.17, 0.0);
    ear.scale.set(0.55, 1.0, 0.7);
    group.add(ear);
  });

  // Eyebrows
  const browMat = new THREE.MeshStandardMaterial({ color: 0x3a2614, roughness: 0.9 });
  [-1, 1].forEach(s => {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.075, 0.016, 0.02), browMat);
    brow.position.set(s * 0.082, 1.245, 0.196);
    brow.rotation.z = s * -0.12;
    group.add(brow);
  });

  // Eyes - sclera + brown iris + pupil + highlight
  [-1, 1].forEach(s => {
    const sclera = new THREE.Mesh(new THREE.SphereGeometry(0.038, 10, 10),
      new THREE.MeshStandardMaterial({ color: 0xf6f2ee, emissive: 0x554433, emissiveIntensity: 0.3, roughness: 0.4 }));
    sclera.position.set(s * 0.082, 1.205, 0.188);
    sclera.scale.set(1.0, 0.78, 0.7);
    group.add(sclera);
    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1c, emissive: 0x2a1a08, emissiveIntensity: 0.4, roughness: 0.3 }));
    iris.position.set(s * 0.082, 1.205, 0.214);
    group.add(iris);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.011, 6, 6), new THREE.MeshBasicMaterial({ color: 0x080808 }));
    pupil.position.set(s * 0.082, 1.205, 0.226);
    group.add(pupil);
    const glint = new THREE.Mesh(new THREE.SphereGeometry(0.006, 5, 5), new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false }));
    glint.position.set(s * 0.082 + 0.008, 1.214, 0.23);
    group.add(glint);
  });

  // Nose - bridge + tip
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.028, 0.075, 6),
    new THREE.MeshStandardMaterial({ color: 0xe0aa86, emissive: 0x6a4a32, emissiveIntensity: 0.5, roughness: 0.55 }));
  nose.position.set(0, 1.155, 0.215);
  nose.rotation.x = Math.PI * 0.5;
  group.add(nose);

  // Wavy center-parted brown bob (Season 3 look)
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x4a3018, emissive: 0x241608, emissiveIntensity: 0.5, roughness: 0.95 });
  const hairHi = new THREE.MeshStandardMaterial({ color: 0x6b4a26, emissive: 0x3a2410, emissiveIntensity: 0.5, roughness: 0.95 });
  // Back mass reaching to the shoulders
  const hairBack = new THREE.Mesh(new THREE.SphereGeometry(0.255, 16, 14), hairMat);
  hairBack.position.set(0, 1.2, -0.06);
  hairBack.scale.set(1.12, 1.18, 1.1);
  group.add(hairBack);
  // Crown with a visible center part (two swept halves)
  [-1, 1].forEach(s => {
    const crown = new THREE.Mesh(new THREE.SphereGeometry(0.2, 14, 12), s < 0 ? hairMat : hairHi);
    crown.position.set(s * 0.06, 1.305, -0.01);
    crown.scale.set(0.92, 0.7, 1.02);
    group.add(crown);
  });
  // Side-swept fringe framing the forehead
  [-1, 1].forEach(s => {
    const bang = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.16, 5, 8), s < 0 ? hairHi : hairMat);
    bang.position.set(s * 0.13, 1.27, 0.16);
    bang.rotation.set(0.5, 0, s * 0.55);
    group.add(bang);
  });
  // Wavy locks down to the shoulders
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    if (Math.sin(a) > 0.5 && Math.abs(Math.cos(a)) < 0.45) continue; // keep face clear
    const len = 0.26 + Math.random() * 0.12;
    const lock = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, len, 5, 7), i % 3 === 0 ? hairHi : hairMat);
    const rad = 0.215;
    lock.position.set(Math.cos(a) * rad, 0.99, Math.sin(a) * rad * 0.8 - 0.05);
    lock.rotation.x = Math.sin(a) * 0.4 + 0.1;
    lock.rotation.z = Math.cos(a) * 0.4;
    group.add(lock);
  }

  // Smiling mouth
  const smileMat = new THREE.MeshStandardMaterial({ color: 0xc85a6a, emissive: 0x6a2a33, emissiveIntensity: 0.5, roughness: 0.6 });
  const smile = new THREE.Mesh(new THREE.TorusGeometry(0.058, 0.014, 6, 14, Math.PI), smileMat);
  smile.position.set(0, 1.105, 0.205);
  smile.rotation.z = Math.PI;
  group.add(smile);

  // Arms
  [-1, 1].forEach((side, armIdx) => {
    const shoulderGeo = new THREE.CapsuleGeometry(0.06, 0.25, 4, 6);
    const armMat = new THREE.MeshStandardMaterial({ map: shirtTex, emissiveMap: shirtTex, emissive: 0xffffff, emissiveIntensity: 0.45, roughness: 0.75 });
    const arm = new THREE.Mesh(shoulderGeo, armMat);
    arm.position.set(side * 0.32, 0.8, 0);
    arm.rotation.z = side * 0.3;
    arm.userData.isArm = true;
    arm.userData.side = side;
    group.add(arm);

    // Hand glow
    const handGeo = new THREE.SphereGeometry(0.07, 6, 6);
    const handMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
    const hand = new THREE.Mesh(handGeo, handMat);
    hand.position.set(side * 0.38, 0.58, 0.12);
    hand.userData.isHandGlow = true;
    group.add(hand);
    if (armIdx === 0) player.leftHand = hand;
    else player.rightHand = hand;
  });

  // Legs
  [-1, 1].forEach((side, legIdx) => {
    const thighGeo = new THREE.CapsuleGeometry(0.07, 0.28, 4, 6);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x2a3550, emissive: 0x141c2e, emissiveIntensity: 0.6, roughness: 0.8 });
    const thigh = new THREE.Mesh(thighGeo, legMat);
    thigh.position.set(side * 0.12, 0.2, 0);
    thigh.userData.isLeg = true;
    thigh.userData.side = side;
    thigh.userData.legIdx = legIdx;
    group.add(thigh);
  });

  // Bright cyan/purple rim outline accents - read on ANY background
  const rimAccentMat = new THREE.MeshBasicMaterial({ color: 0x66e0ff, side: THREE.BackSide, toneMapped: false });
  const bodyRim = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.33, 0.74, 8), rimAccentMat);
  bodyRim.position.y = 0.55;
  group.add(bodyRim);
  const headRim = new THREE.Mesh(new THREE.SphereGeometry(0.245, 12, 10), new THREE.MeshBasicMaterial({ color: 0xc066ff, side: THREE.BackSide, toneMapped: false }));
  headRim.position.y = 1.18;
  group.add(headRim);

  // Psychic aura - layered, gently pulsing always
  const auraInner = new THREE.Mesh(
    new THREE.SphereGeometry(0.62, 12, 10),
    new THREE.MeshBasicMaterial({ color: 0xcc66ff, transparent: true, opacity: 0.12, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  auraInner.position.y = 0.6;
  group.add(auraInner);
  const auraOuter = new THREE.Mesh(
    new THREE.SphereGeometry(0.85, 12, 10),
    new THREE.MeshBasicMaterial({ color: 0x8844ff, transparent: true, opacity: 0.06, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  auraOuter.position.y = 0.6;
  group.add(auraOuter);
  player.auraMesh = auraInner;
  player.auraOuter = auraOuter;

  // Soft ground glow disc so she's grounded and visible
  const discTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0, 'rgba(140,90,200,0.8)');
    g.addColorStop(0.6, 'rgba(102,51,170,0.25)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c);
  })();
  const groundGlow = new THREE.Mesh(
    new THREE.PlaneGeometry(2.4, 2.4),
    new THREE.MeshBasicMaterial({ map: discTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
  );
  groundGlow.rotation.x = -Math.PI / 2;
  groundGlow.position.y = 0.07;
  group.add(groundGlow);

  // Nosebleed (hidden by default)
  for (let i = 0; i < 2; i++) {
    const nbGeo = new THREE.CylinderGeometry(0.01, 0.015, 0.08, 4);
    const nbMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const nb = new THREE.Mesh(nbGeo, nbMat);
    nb.position.set(i === 0 ? -0.02 : 0.02, 1.1, 0.21);
    nb.visible = false;
    nb.userData.isNosebleed = true;
    group.add(nb);
    player.nosebleed.push(nb);
  }

  group.castShadow = true;
  // Use real art (eleven.glb / eleven.png) if present, else this stylized model
  applyCharacterArt(group, { name: 'eleven', height: 1.7, yOffset: 0 });
  scene.add(group);
  player.mesh = group;
  player.mesh.position.set(0, 0, 0);
}

// ============================================================
// 6. ENEMIES
// ============================================================
function buildDemogorgon(isBoss = false) {
  const group = new THREE.Group();
  const scale = isBoss ? 1.6 : 1.0;
  const skinMat = new THREE.MeshStandardMaterial({ color: 0x8f8275, emissive: 0x322820, emissiveIntensity: 0.55, roughness: 0.95, metalness: 0 });
  // Shared bioluminescent vein/ridge material - traces the silhouette in red neon
  const veinMat = new THREE.MeshBasicMaterial({ color: 0xff3355, toneMapped: false });
  group.userData.skinMats = [];
  const trackSkin = m => { group.userData.skinMats.push(m); return m; };

  // Body - more hunched
  const bodyGeo = new THREE.CapsuleGeometry(0.38 * scale, 0.7 * scale, 6, 10);
  const bodyMesh = new THREE.Mesh(bodyGeo, trackSkin(skinMat.clone()));
  bodyMesh.position.y = 0.95 * scale;
  bodyMesh.position.z = 0.1 * scale;
  bodyMesh.rotation.x = 0.42;
  group.add(bodyMesh);

  // Glowing dorsal ridge veins down the back
  for (let i = 0; i < 5; i++) {
    const ridge = new THREE.Mesh(new THREE.SphereGeometry(0.05 * scale, 5, 5), veinMat);
    ridge.scale.set(1, 1, 1.8);
    ridge.position.set(0, (0.7 + i * 0.22) * scale, (-0.28 - i * 0.02) * scale);
    group.add(ridge);
  }
  // Vein lines along the torso front
  [-1, 1].forEach(s => {
    const vein = new THREE.Mesh(new THREE.CylinderGeometry(0.018 * scale, 0.018 * scale, 0.9 * scale, 4), veinMat);
    vein.position.set(s * 0.18 * scale, 1.0 * scale, 0.34 * scale);
    vein.rotation.x = 0.42;
    vein.rotation.z = s * 0.12;
    group.add(vein);
  });

  // Cranial stalk - small skull behind the flower (no face, just sinew)
  const headGeo = new THREE.SphereGeometry(0.3 * scale, 12, 10);
  const headMesh = new THREE.Mesh(headGeo, trackSkin(skinMat.clone()));
  headMesh.position.y = 1.78 * scale;
  headMesh.position.z = 0.18 * scale;
  headMesh.scale.set(0.95, 1.05, 1.1);
  group.add(headMesh);
  group.userData.headMesh = headMesh;
  // Sinewy ridged folds wrapping the skull
  for (let i = 0; i < 4; i++) {
    const fold = new THREE.Mesh(
      new THREE.TorusGeometry((0.17 - i * 0.015) * scale, 0.022 * scale, 5, 12, Math.PI * 1.3),
      trackSkin(skinMat.clone())
    );
    fold.position.set(0, (1.78 + (i - 1.5) * 0.11) * scale, 0.34 * scale);
    fold.rotation.x = Math.PI / 2;
    fold.rotation.z = Math.PI / 2;
    group.add(fold);
  }
  // Neck sinew connecting skull to torso
  const dNeck = new THREE.Mesh(new THREE.CylinderGeometry(0.13 * scale, 0.2 * scale, 0.4 * scale, 8), trackSkin(skinMat.clone()));
  dNeck.position.set(0, 1.5 * scale, 0.15 * scale);
  dNeck.rotation.x = 0.3;
  group.add(dNeck);

  // Per-enemy head glow light (perf-capped; bosses prioritized & brighter)
  if (activeEnemyLights < MAX_ENEMY_LIGHTS) {
    const eLight = isBoss
      ? new THREE.PointLight(0xff3355, 1.6, 9, 2)
      : new THREE.PointLight(0xaa2233, 0.9, 5, 2);
    eLight.position.set(0, 1.85 * scale, 0.4 * scale);
    group.add(eLight);
    group.userData.enemyLight = eLight;
    activeEnemyLights++;
  }

  // Flower mouth - 6 petals
  const petalGroup = new THREE.Group();
  petalGroup.position.y = 1.78 * scale;
  petalGroup.position.z = 0.52 * scale;
  group.userData.petalGroup = petalGroup;
  group.userData.petalMeshes = [];
  group.userData.mouthOpen = 0;

  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2;
    const petal = new THREE.Group();
    const s = 0.26 * scale;
    const ca = Math.cos(angle), sa = Math.sin(angle);
    // Curved 4-vertex leaf petal: narrow base, bulged middle, tapered tip
    const base1 = [ca * 0.06 * scale - sa * 0.05 * scale, sa * 0.06 * scale + ca * 0.05 * scale, 0];
    const base2 = [ca * 0.06 * scale + sa * 0.05 * scale, sa * 0.06 * scale - ca * 0.05 * scale, 0];
    const mid1 = [ca * s - sa * 0.13 * scale, sa * s + ca * 0.13 * scale, s * 0.95];
    const mid2 = [ca * s + sa * 0.13 * scale, sa * s - ca * 0.13 * scale, s * 0.95];
    const tip = [ca * s * 0.72, sa * s * 0.72, s * 1.7];
    const petalGeo = new THREE.BufferGeometry();
    petalGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
      ...base1, ...base2, ...mid2,
      ...base1, ...mid2, ...mid1,
      ...mid1, ...mid2, ...tip,
    ]), 3));
    petalGeo.computeVertexNormals();
    const petalMat = new THREE.MeshStandardMaterial({
      color: 0x5a2422, emissive: 0xff2a55, emissiveIntensity: 0.85,
      roughness: 0.85, side: THREE.DoubleSide, flatShading: true
    });
    const petalSkin = new THREE.Mesh(petalGeo, petalMat);
    petal.add(petalSkin);
    // Row of inward-pointing fangs along both edges of the petal
    const toothMat = new THREE.MeshStandardMaterial({ color: 0xf3ece0, emissive: 0x554433, emissiveIntensity: 0.3, roughness: 0.5 });
    for (let t = 1; t <= 5; t++) {
      const f = t / 6;
      [[base1, mid1, -1], [base2, mid2, 1]].forEach(([b, m]) => {
        const tooth = new THREE.Mesh(new THREE.ConeGeometry(0.022 * scale, 0.12 * scale, 4), toothMat);
        tooth.position.set(
          b[0] + (m[0] - b[0]) * f,
          b[1] + (m[1] - b[1]) * f,
          b[2] + (m[2] - b[2]) * f
        );
        // point fangs in toward the central maw
        tooth.lookAt(0, 0, s * 0.4);
        petal.add(tooth);
      });
    }
    petal.userData.baseAngle = angle;
    petal.userData.petalIdx = i;
    petalGroup.add(petal);
    group.userData.petalMeshes.push(petal);
  }

  // Inner mouth glow + pulsing bright throat sphere
  const innerGeo = new THREE.CircleGeometry(0.14 * scale, 10);
  const innerMat = new THREE.MeshBasicMaterial({ color: 0xff2a55, toneMapped: false });
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);
  innerMesh.position.z = 0.01;
  petalGroup.add(innerMesh);
  const throat = new THREE.Mesh(
    new THREE.SphereGeometry(0.1 * scale, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff4466, toneMapped: false })
  );
  throat.position.z = -0.08 * scale;
  petalGroup.add(throat);
  group.userData.throatMesh = throat;
  group.add(petalGroup);

  // Legs (4 legs: thigh + shin + claw)
  const legPositions = [
    { side: -1, front: 1 }, { side: 1, front: 1 },
    { side: -1, front: -1 }, { side: 1, front: -1 }
  ];
  legPositions.forEach(({ side, front }) => {
    const thighGeo = new THREE.CapsuleGeometry(0.09 * scale, 0.35 * scale, 4, 6);
    const thigh = new THREE.Mesh(thighGeo, skinMat.clone());
    thigh.position.set(side * 0.32 * scale, 0.65 * scale, front * 0.28 * scale);
    thigh.rotation.z = side * 0.35;
    thigh.rotation.x = front * 0.4;
    group.add(thigh);

    const shinGeo = new THREE.CapsuleGeometry(0.065 * scale, 0.3 * scale, 4, 6);
    const shin = new THREE.Mesh(shinGeo, skinMat.clone());
    shin.position.set(side * 0.46 * scale, 0.28 * scale, front * 0.42 * scale);
    shin.rotation.z = side * 0.5;
    shin.rotation.x = front * 0.6;
    group.add(shin);

    // Claw foot
    for (let c = 0; c < 3; c++) {
      const clawAngle = (c - 1) * 0.35;
      const clawGeo = new THREE.ConeGeometry(0.025 * scale, 0.12 * scale, 4);
      const clawMesh = new THREE.Mesh(clawGeo, skinMat.clone());
      clawMesh.position.set(
        side * 0.56 * scale + Math.sin(clawAngle) * 0.08 * scale,
        0.06 * scale,
        front * 0.56 * scale + c * 0.04 * scale
      );
      clawMesh.rotation.x = Math.PI / 2 + front * 0.4;
      group.add(clawMesh);
    }
  });

  // Arms with 3-pronged claws - longer, reaching forward menacingly
  [-1, 1].forEach(side => {
    const armGeo = new THREE.CapsuleGeometry(0.085 * scale, 0.62 * scale, 4, 8);
    const armMesh = new THREE.Mesh(armGeo, trackSkin(skinMat.clone()));
    armMesh.position.set(side * 0.46 * scale, 1.05 * scale, 0.28 * scale);
    armMesh.rotation.z = side * 0.7;
    armMesh.rotation.x = -0.7;
    group.add(armMesh);

    const foreGeo = new THREE.CapsuleGeometry(0.07 * scale, 0.5 * scale, 4, 8);
    const fore = new THREE.Mesh(foreGeo, trackSkin(skinMat.clone()));
    fore.position.set(side * 0.66 * scale, 0.66 * scale, 0.62 * scale);
    fore.rotation.z = side * 0.7;
    fore.rotation.x = -0.95;
    group.add(fore);
    // glowing vein along the forearm
    const aVein = new THREE.Mesh(new THREE.CylinderGeometry(0.015 * scale, 0.015 * scale, 0.5 * scale, 4), veinMat);
    aVein.position.copy(fore.position);
    aVein.rotation.copy(fore.rotation);
    group.add(aVein);

    // 3-pronged claw
    for (let c = 0; c < 3; c++) {
      const cOff = (c - 1) * 0.1 * scale;
      const clawGeo = new THREE.ConeGeometry(0.028 * scale, 0.15 * scale, 4);
      const claw = new THREE.Mesh(clawGeo, skinMat.clone());
      claw.position.set(side * 0.9 * scale + cOff, 0.42 * scale, 0.32 * scale + c * 0.05 * scale);
      claw.rotation.x = -0.8;
      claw.rotation.z = side * 0.15;
      group.add(claw);
    }
  });

  // Slime tendrils
  for (let i = 0; i < 4; i++) {
    const tGeo = new THREE.CylinderGeometry(0.02 * scale, 0.005 * scale, 0.4 * scale, 4);
    const tMat = new THREE.MeshStandardMaterial({ color: 0x66cc33, emissive: 0x336611, emissiveIntensity: 0.7, transparent: true, opacity: 0.75 });
    const tendril = new THREE.Mesh(tGeo, tMat);
    tendril.position.set(
      (Math.random() - 0.5) * 0.5 * scale,
      0.5 * scale,
      (Math.random() - 0.5) * 0.4 * scale
    );
    tendril.rotation.z = (Math.random() - 0.5) * 0.5;
    tendril.rotation.x = 0.3 + Math.random() * 0.4;
    group.add(tendril);
  }

  group.castShadow = true;
  // Use real art (demogorgon.glb / demogorgon.png) if present, else this model
  applyCharacterArt(group, { name: 'demogorgon', height: (isBoss ? 3.6 : 2.3), yOffset: 0 });
  return group;
}

function buildDemodog() {
  const group = new THREE.Group();
  const scale = 0.7;
  const skinMat = new THREE.MeshStandardMaterial({ color: 0x8f8275, emissive: 0x322820, emissiveIntensity: 0.55, roughness: 0.95, metalness: 0 });
  const veinMat = new THREE.MeshBasicMaterial({ color: 0xff3355, toneMapped: false });
  group.userData.skinMats = [];
  const trackSkin = m => { group.userData.skinMats.push(m); return m; };

  // Low body
  const bodyGeo = new THREE.CapsuleGeometry(0.22 * scale, 0.55 * scale, 4, 8);
  const bodyMesh = new THREE.Mesh(bodyGeo, trackSkin(skinMat.clone()));
  bodyMesh.position.y = 0.38 * scale;
  bodyMesh.rotation.x = Math.PI / 2;
  group.add(bodyMesh);

  // Glowing spine ridge along the back
  for (let i = 0; i < 5; i++) {
    const r = new THREE.Mesh(new THREE.ConeGeometry(0.04 * scale, 0.12 * scale, 4), veinMat);
    r.position.set(0, 0.55 * scale, (0.25 - i * 0.18) * scale);
    group.add(r);
  }

  // Elongated snout
  const snoutGeo = new THREE.CapsuleGeometry(0.13 * scale, 0.3 * scale, 4, 8);
  const snout = new THREE.Mesh(snoutGeo, trackSkin(skinMat.clone()));
  snout.position.set(0, 0.42 * scale, 0.4 * scale);
  snout.rotation.x = Math.PI / 2;
  group.add(snout);

  // Eyes (glowing amber)
  [-0.1, 0.1].forEach(x => {
    const eGeo = new THREE.SphereGeometry(0.05 * scale, 5, 5);
    const eMat = new THREE.MeshBasicMaterial({ color: 0xffae00, toneMapped: false });
    const eye = new THREE.Mesh(eGeo, eMat);
    eye.position.set(x * scale, 0.55 * scale, 0.32 * scale);
    group.add(eye);
  });

  // Flower mouth petals (4 smaller)
  const petalGroup = new THREE.Group();
  petalGroup.position.set(0, 0.42 * scale, 0.66 * scale);
  group.userData.petalGroup = petalGroup;
  group.userData.petalMeshes = [];
  group.userData.mouthOpen = 0;

  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const s = 0.1 * scale;
    const petalGeo = new THREE.BufferGeometry();
    const verts = new Float32Array([
      0, 0, 0,
      Math.cos(angle - 0.3) * s, Math.sin(angle - 0.3) * s, 0,
      Math.cos(angle) * s * 0.7, Math.sin(angle) * s * 0.7, s * 1.2,
      0, 0, 0,
      Math.cos(angle + 0.3) * s, Math.sin(angle + 0.3) * s, 0,
      Math.cos(angle) * s * 0.7, Math.sin(angle) * s * 0.7, s * 1.2,
    ]);
    petalGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    petalGeo.computeVertexNormals();
    const petal = new THREE.Mesh(petalGeo, new THREE.MeshStandardMaterial({ color: 0x6e2a28, emissive: 0xff2a55, emissiveIntensity: 0.9, roughness: 0.8, side: THREE.DoubleSide }));
    petal.userData.baseAngle = angle;
    petalGroup.add(petal);
    group.userData.petalMeshes.push(petal);
  }
  const igGeo = new THREE.CircleGeometry(0.08 * scale, 8);
  const igMat = new THREE.MeshBasicMaterial({ color: 0xff2a55, toneMapped: false });
  petalGroup.add(new THREE.Mesh(igGeo, igMat));
  const dThroat = new THREE.Mesh(new THREE.SphereGeometry(0.06 * scale, 6, 6), new THREE.MeshBasicMaterial({ color: 0xff4466, toneMapped: false }));
  dThroat.position.z = -0.05 * scale;
  petalGroup.add(dThroat);
  group.userData.throatMesh = dThroat;
  group.add(petalGroup);

  // Per-demodog head glow (perf-capped)
  if (activeEnemyLights < MAX_ENEMY_LIGHTS) {
    const dLight = new THREE.PointLight(0xaa2233, 0.9, 5, 2);
    dLight.position.set(0, 0.5 * scale, 0.4 * scale);
    group.add(dLight);
    group.userData.enemyLight = dLight;
    activeEnemyLights++;
  }

  // 4 legs low to ground
  [[0.18, 0.3], [-0.18, 0.3], [0.18, -0.3], [-0.18, -0.3]].forEach(([x, z]) => {
    const legGeo = new THREE.CapsuleGeometry(0.055 * scale, 0.28 * scale, 3, 5);
    const leg = new THREE.Mesh(legGeo, trackSkin(skinMat.clone()));
    leg.position.set(x * scale, 0.15 * scale, z * scale);
    leg.rotation.z = x > 0 ? 0.2 : -0.2;
    group.add(leg);
  });

  group.castShadow = true;
  return group;
}
